    document.getElementById('sel-toolbar').classList.toggle('on', n > 0);
    document.getElementById('sel-label').textContent = `${n} selected`;
    if (n === 0) hideFolderDropdown();
  }

  function clearSelection() {
    selectedIds.clear();
    mainEl.querySelectorAll('.idea-card.sel, .list-row.sel').forEach(el => el.classList.remove('sel'));
    updateSelUI();
  }

  // ── Marquee ──────────────────────────────────────────────
  let mqStart = null;
  let mqEl = null;

  document.getElementById('content-area').addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    if (e.target.closest('.idea-card,.list-row,.star-btn,.card-sel,.row-sel,.card-footer,.sel-toolbar,button,a')) return;
    mqStart = { x: e.clientX, y: e.clientY };
    mqEl = document.createElement('div');
    mqEl.className = 'marquee';
    Object.assign(mqEl.style, { left: e.clientX+'px', top: e.clientY+'px', width:'0', height:'0' });
    document.body.appendChild(mqEl);
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!mqStart || !mqEl) return;
    const x1 = Math.min(e.clientX, mqStart.x), y1 = Math.min(e.clientY, mqStart.y);
    const x2 = Math.max(e.clientX, mqStart.x), y2 = Math.max(e.clientY, mqStart.y);
    Object.assign(mqEl.style, { left:x1+'px', top:y1+'px', width:(x2-x1)+'px', height:(y2-y1)+'px' });
  });

  document.addEventListener('mouseup', e => {
    if (!mqStart) return;
    const wasDrag = mqEl && (mqEl.offsetWidth > 5 || mqEl.offsetHeight > 5);
    const r = mqEl ? mqEl.getBoundingClientRect() : null;
    if (mqEl) { mqEl.remove(); mqEl = null; }
    mqStart = null;

    if (wasDrag && r) {
      mainEl.querySelectorAll('.idea-card, .list-row').forEach(card => {
        const cr = card.getBoundingClientRect();
        if (!(r.right < cr.left || r.left > cr.right || r.bottom < cr.top || r.top > cr.bottom)) {
          selectedIds.add(card.dataset.id);
          card.classList.add('sel');
        }
      });
      updateSelUI();
    } else {
      clearSelection();
    }
  });

  // ── View ─────────────────────────────────────────────────
  function openView(id) {
    const idea = ideas.find(i => i.id === id);
    if (!idea) return;
    viewingId = id;

    const color = catColor(idea.category);

    document.getElementById('view-bar-meta').innerHTML = `
      <span class="cat-badge" style="color:${color};border-color:${color}60;background:${color}18">${esc(idea.category)}</span>
      <span class="view-bar-date">${fmtDate(idea.created_at)}</span>
    `;

    document.getElementById('view-title').textContent = idea.title;
    document.getElementById('view-notes').textContent = idea.notes || '';

    const media = document.getElementById('view-media');
    if (idea.file_url && idea.file_type === 'image') {
      media.innerHTML = `<img src="${esc(idea.file_url)}" alt="">`;
      media.style.display = 'block';
    } else if (idea.file_url && idea.file_type === 'video') {
      media.innerHTML = `<video src="${esc(idea.file_url)}" controls></video>`;
      media.style.display = 'block';
    } else if (idea.file_url && idea.file_type === 'youtube') {
      const vid = extractYouTubeId(idea.file_url);
      if (vid) {
        media.innerHTML = `<iframe class="yt-embed" src="https://www.youtube.com/embed/${esc(vid)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
        media.style.display = 'block';
      } else {
        media.innerHTML = ''; media.style.display = 'none';
      }
    } else if (idea.file_url && idea.file_type === 'instagram') {
      const label = igShortLabel(idea.file_url);
      media.innerHTML = `<div class="ig-view-card">
        ${IG_SVG}
        <div class="ig-label">Instagram</div>
        <div class="ig-url-text">${esc(label)}</div>
        <a class="ig-open-btn" href="${esc(idea.file_url)}" target="_blank" rel="noopener noreferrer">Open in Instagram ↗</a>
      </div>`;
      media.style.display = 'block';
    } else {
      media.innerHTML = '';
      media.style.display = 'none';
    }

    viewOverlay.removeAttribute('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closeView() {
    viewOverlay.setAttribute('hidden', '');
    document.body.style.overflow = '';
    viewingId = null;
  }

  // ── Delete ───────────────────────────────────────────────
  document.getElementById('view-delete').addEventListener('click', async () => {
    if (!viewingId) return;
    const id = viewingId;
    const btn = document.getElementById('view-delete');
    btn.disabled = true;
    try {
      closeView();
      await softDeleteIdea(id);
    } catch (err) {
      toast(err.message, true);
    } finally {
      btn.disabled = false;
    }
  });

  // ── Form open / close ────────────────────────────────────
  function openForm(idea = null) {
    editingId       = idea ? idea.id : null;
    editFileRemoved = false;

    formOverlay.querySelector('.modal-heading').textContent = idea ? 'Edit Idea' : 'New Idea';
    document.getElementById('form-save').textContent        = idea ? 'Save Changes' : 'Save Idea';

    formTitleEl.value = idea ? idea.title      : '';
    formCatEl.value   = idea ? idea.category   : (categories[0] || '');
    formNotesEl.value = idea ? (idea.notes || '') : '';
    formFileEl.value  = '';
    filePreviewEl.innerHTML = '';
    galleryNewFiles = [];
    galleryDeleteIds = new Set();

    // Reset YouTube field
    const ytInput = document.getElementById('form-youtube');
    const ytPreviewEl = document.getElementById('yt-preview');
    ytInput.value = '';
    ytPreviewEl.style.display = 'none';
    ytPreviewEl.innerHTML = '';

    if (idea && idea.file_url) showExistingFile(idea);

    // Show existing gallery
    const existingFiles = editingId ? (ideaFiles[editingId] || []) : [];
    const existingGalleryEl = document.getElementById('gallery-existing');
    const existingGridEl = document.getElementById('gallery-existing-grid');

    if (existingFiles.length) {
      existingGridEl.innerHTML = existingFiles.map(f => `
        <div class="gallery-thumb" data-file-id="${esc(f.id)}">
          ${f.file_type === 'video'
            ? `<video src="${esc(f.file_url)}" muted preload="metadata"></video>`
            : `<img src="${esc(f.file_url)}" alt="">`}
          <button class="gallery-thumb-del" data-file-id="${esc(f.id)}" title="Remove">×</button>
        </div>`).join('');
      existingGridEl.querySelectorAll('.gallery-thumb-del').forEach(btn => {
        btn.addEventListener('click', () => {
          const fid = btn.dataset.fileId;
          galleryDeleteIds.add(fid);
          btn.closest('.gallery-thumb').remove();
          if (!existingGridEl.children.length) existingGalleryEl.style.display = 'none';
        });
      });
      existingGalleryEl.style.display = '';
    } else {
      existingGalleryEl.style.display = 'none';
    }

    document.getElementById('gallery-new').style.display = 'none';
    document.getElementById('gallery-new-grid').innerHTML = '';

    uploadRowEl.style.display = 'none';
    document.getElementById('form-save').disabled = false;
    formOverlay.removeAttribute('hidden');
    document.body.style.overflow = 'hidden';
    setTimeout(() => formTitleEl.focus(), 60);
  }

  function closeForm() {
    formOverlay.setAttribute('hidden', '');
    document.body.style.overflow = '';
    editingId = null;
    galleryNewFiles = [];
    galleryDeleteIds = new Set();
    document.getElementById('gallery-new').style.display = 'none';
    document.getElementById('gallery-existing').style.display = 'none';
    document.getElementById('yt-preview').style.display = 'none';
    document.getElementById('yt-preview').innerHTML = '';
    document.getElementById('form-youtube').value = '';
  }

  function showExistingFile(idea) {
    if (idea.file_type === 'youtube') {
      const vid = extractYouTubeId(idea.file_url);
      if (vid) {
        document.getElementById('form-youtube').value = idea.file_url;
        showYtPreview(vid, idea.file_url, true);
      }
      return;
    }
    if (idea.file_type === 'instagram') {
      document.getElementById('form-youtube').value = idea.file_url;
      showIgPreview(idea.file_url, true);
      return;
    }
    const isVid = idea.file_type === 'video';
    filePreviewEl.innerHTML = `<div class="file-preview-wrap">
      ${isVid
        ? `<video src="${esc(idea.file_url)}" muted preload="metadata" playsinline></video>`
        : `<img src="${esc(idea.file_url)}" alt="">`}
      <div class="file-preview-footer">
        <span>Current ${isVid ? 'video' : 'image'} — pick a new file below to replace</span>
        <button class="remove-file" id="rm-file">✕ Remove</button>
      </div>
    </div>`;
    document.getElementById('rm-file').addEventListener('click', () => {
      editFileRemoved = true;
      filePreviewEl.innerHTML = '<p style="font-size:12px;color:var(--text3);margin-top:8px">File will be removed on save.</p>';
    });
  }

  // ── File preview ─────────────────────────────────────────
  function showFilePreview(file) {
    if (!file) { filePreviewEl.innerHTML = ''; return; }
    const url   = URL.createObjectURL(file);
    const isVid = file.type.startsWith('video/');
    filePreviewEl.innerHTML = `<div class="file-preview-wrap">
      ${isVid ? `<video src="${url}" muted></video>` : `<img src="${url}" alt="">`}
      <div class="file-preview-footer">
        <span>${esc(file.name)}</span>
        <button class="remove-file" id="rm-file">✕</button>
      </div>
    </div>`;
    document.getElementById('rm-file').addEventListener('click', () => {
      formFileEl.value = '';
      filePreviewEl.innerHTML = '';
    });
  }

  formFileEl.addEventListener('change', () => {
    const files = Array.from(formFileEl.files);
    if (!files.length) return;

    // First file: show in existing single-file preview (backwards compat)
    showFilePreview(files[0]);

    // Additional files: show in gallery-new section
    galleryNewFiles = files.slice(1);
    const newGalleryEl = document.getElementById('gallery-new');
    const newGridEl = document.getElementById('gallery-new-grid');

    if (galleryNewFiles.length) {
      newGridEl.innerHTML = '';
      galleryNewFiles.forEach((f, i) => {
        const url = URL.createObjectURL(f);
        const div = document.createElement('div');
        div.className = 'gallery-thumb';
        div.innerHTML = (f.type.startsWith('video/')
          ? `<video src="${url}" muted></video>`
          : `<img src="${url}" alt="">`) +
          `<button class="gallery-thumb-del" title="Remove">×</button>`;
        div.querySelector('.gallery-thumb-del').addEventListener('click', () => {
          galleryNewFiles.splice(i, 1);
          div.remove();
          if (!newGridEl.children.length) newGalleryEl.style.display = 'none';
        });
        newGridEl.appendChild(div);
      });
      newGalleryEl.style.display = '';
    } else {
      newGalleryEl.style.display = 'none';
    }
  });

  fileDropEl.addEventListener('dragover',  e => { e.preventDefault(); fileDropEl.classList.add('over'); });
  fileDropEl.addEventListener('dragleave', () => fileDropEl.classList.remove('over'));
  fileDropEl.addEventListener('drop', e => {
    e.preventDefault();
    fileDropEl.classList.remove('over');
    const f = e.dataTransfer.files[0];
    if (f) {
      const dt = new DataTransfer();
      dt.items.add(f);
      formFileEl.files = dt.files;

    uploadRowEl.style.display = 'flex';

    try {
      const youtubeUrl   = document.getElementById('form-youtube').value.trim();
      const youtubeId    = extractYouTubeId(youtubeUrl);
      const instagramUrl = (!youtubeId && isInstagramUrl(youtubeUrl)) ? normaliseInstagramUrl(youtubeUrl) : null;

      const fd = new FormData();
      fd.append('title', title);
      fd.append('category', category);
      if (notes) fd.append('notes', notes);
      if (file)  fd.append('file', file);
      if (!file && youtubeId)    fd.append('youtube_url', youtubeUrl);
      if (!file && instagramUrl) fd.append('instagram_url', instagramUrl);
      if (editingId && editFileRemoved) fd.append('remove_file', 'true');

      // Append gallery new files
      galleryNewFiles.forEach(f => fd.append('files', f));
      // Send delete IDs
      if (galleryDeleteIds.size > 0) fd.append('delete_file_ids', JSON.stringify([...galleryDeleteIds]));

      const url    = editingId ? `/api/ideas/${editingId}` : '/api/ideas';
      const method = editingId ? 'PUT' : 'POST';
      const savedEditingId = editingId;

      const result = await apiFetch(url, { method, body: fd });
      if (result.files && result.files.length) {
        const id = savedEditingId || result.idea?.id;
        if (id) {
          if (!ideaFiles[id]) ideaFiles[id] = [];
          ideaFiles[id].push(...result.files);
        }
      }
      // Remove deleted files from ideaFiles
      galleryDeleteIds.forEach(fid => {
        Object.keys(ideaFiles).forEach(ideaId => {
          ideaFiles[ideaId] = (ideaFiles[ideaId] || []).filter(f => f.id !== fid);
        });
      });
      galleryNewFiles = [];
      galleryDeleteIds = new Set();

  // ── Import ───────────────────────────────────────────────
  const importOverlay  = document.getElementById('import-overlay');

  let parsedEntries    = [];

  function parseMarkdown(text) {
    const VALID = categories.length ? categories : ['Marketing','Technology','Animation','Business','Artwork','Research','Other'];
    const entries = [];
    let cat = 'Other', title = null, lines = [];

    function flush() {
      if (!title) return;
      entries.push({ title, category: cat, notes: lines.join('\n').trim() || null });
      title = null; lines = [];
    }

    for (const raw of text.split('\n')) {
      const line = raw.trimEnd();
      if (line.startsWith('## ')) {
        flush();
        const label = line.slice(3).trim();
        cat = VALID.find(c => c.toLowerCase() === label.toLowerCase()) || 'Other';
      } else if (line.startsWith('### ')) {
        flush();
        title = line.slice(4).trim();
      } else if (title !== null) {
        lines.push(line);
      }
    }
    flush();
    return entries;
  }

  function showImportPreview(entries) {
    if (!entries.length) {
      importPreview.innerHTML = `<p class="import-summary">No entries found. Make sure the file uses <code>## Category</code> and <code>### Title</code> headings.</p>`;
      importActions.style.display = 'none';
      return;
    }

    const byCat = {};
    entries.forEach(e => { (byCat[e.category] = byCat[e.category] || []).push(e); });

    const rows = Object.entries(byCat).map(([cat, list]) => `
      <li class="import-cat-row">
        <span class="import-cat-name">
          <span class="import-dot" style="background:${catColor(cat)}"></span>
          ${esc(cat)}
        </span>
        <span class="import-count">${list.length} ${list.length === 1 ? 'entry' : 'entries'}</span>
      </li>`).join('');

    importPreview.innerHTML = `
      <p class="import-summary">Found <strong>${entries.length}</strong> ${entries.length === 1 ? 'entry' : 'entries'} across <strong>${Object.keys(byCat).length}</strong> ${Object.keys(byCat).length === 1 ? 'category' : 'categories'}:</p>
      <ul class="import-cat-list">${rows}</ul>`;
    importActions.style.display = 'flex';
    document.getElementById('import-confirm').textContent = `Import ${entries.length} ${entries.length === 1 ? 'entry' : 'entries'}`;
  }

  async function saveIdeaField(id, updates) {
    const idea = ideas.find(i => i.id === id);
    if (!idea) return;
    const fd = new FormData();
    fd.append('title',    updates.title    ?? idea.title);
    fd.append('category', updates.category ?? idea.category);
    if ((updates.notes ?? idea.notes) != null) fd.append('notes', updates.notes ?? idea.notes);
    try {
      await apiFetch(`/api/ideas/${id}`, { method: 'PUT', body: fd });
      Object.assign(idea, updates);
      toast('Saved');
      buildSidebarCategories();
    } catch (err) {
      toast(err.message, true);
      throw err;
    }
  }

  function startInlineEditField(id, fieldEl, field) {
    const idea = ideas.find(i => i.id === id);
    if (!idea) return;
    const original = idea[field] || '';
    fieldEl.contentEditable = 'true';
    fieldEl.focus();
    const range = document.createRange();
    range.selectNodeContents(fieldEl);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);

    let committed = false;
    function onKey(e) {
      if (e.key === 'Enter' && field !== 'notes') { e.preventDefault(); fieldEl.blur(); }
      if (e.key === 'Escape') {
        committed = true;
        fieldEl.textContent = original;
        fieldEl.contentEditable = 'false';
        fieldEl.removeEventListener('keydown', onKey);
      }
    }
    fieldEl.addEventListener('keydown', onKey);
    fieldEl.addEventListener('blur', async () => {
      if (committed) return;
      committed = true;
      fieldEl.removeEventListener('keydown', onKey);
      const newVal = fieldEl.textContent.trim();
      fieldEl.contentEditable = 'false';
      if (!newVal || newVal === original) { fieldEl.textContent = original || ''; return; }
      fieldEl.textContent = newVal;
      try { await saveIdeaField(id, { [field]: newVal }); }
      catch { fieldEl.textContent = original; }
    }, { once: true });
  }

  function startInlineCatEdit(id, badgeEl) {
    const idea = ideas.find(i => i.id === id);
    if (!idea) return;
    const original = idea.category;
    const sel = document.createElement('select');
    sel.className = 'inline-cat-select';
    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      if (c === original) opt.selected = true;
      sel.appendChild(opt);
    });
    badgeEl.replaceWith(sel);
    sel.focus();

    async function commit() {
      const newCat = sel.value;
      const color = catColor(newCat);
      const newBadge = document.createElement('span');
      newBadge.className = badgeEl.className;
      newBadge.style.cssText = `color:${color};border-color:${color}60;background:${color}18`;
      newBadge.textContent = newCat;
      newBadge.addEventListener('dblclick', e => { e.stopPropagation(); startInlineCatEdit(id, newBadge); });
      sel.replaceWith(newBadge);
      if (newCat !== original) {
        try { await saveIdeaField(id, { category: newCat }); }
        catch { newBadge.textContent = original; Object.assign(newBadge.style, { color: catColor(original) }); }
      }
    }
    sel.addEventListener('change', commit);
    sel.addEventListener('blur', () => setTimeout(commit, 80), { once: true });
    sel.addEventListener('keydown', e => { if (e.key === 'Escape') { sel.value = original; sel.blur(); } });
  }

  document.getElementById('content-area').addEventListener('click', e => {
    const ig = e.target.closest('.ig-card');
    if (!ig) return;
    e.stopPropagation();
    const url = ig.dataset.igurl;
    if (url) window.open(url, '_blank', 'noopener,noreferrer');
  });

  // ── YouTube / Instagram form field ───────────────────────
  function showYtPreview(vid, url, isExisting = false) {
    const ytPreviewEl = document.getElementById('yt-preview');
    ytPreviewEl.innerHTML = `<div class="yt-url-preview">
      <img src="https://img.youtube.com/vi/${esc(vid)}/maxresdefault.jpg" alt="">
      <div class="yt-url-footer">
        <span>▶ YouTube video</span>
        <button class="remove-file" id="rm-yt">✕ Remove</button>
      </div>
    </div>`;
    ytPreviewEl.style.display = '';
    document.getElementById('rm-yt').addEventListener('click', () => {
      document.getElementById('form-youtube').value = '';
      ytPreviewEl.style.display = 'none';
      ytPreviewEl.innerHTML = '';
      if (isExisting) editFileRemoved = true;
    });
  }

  function showIgPreview(url, isExisting = false) {
    const ytPreviewEl = document.getElementById('yt-preview');
    const label = igShortLabel(url);
    ytPreviewEl.innerHTML = `<div class="yt-url-preview">
      <div class="ig-card" data-igurl="${esc(url)}" style="aspect-ratio:16/9;cursor:pointer">
        <div class="ig-inner">
          ${IG_SVG}
          <div class="ig-label">Instagram</div>
          <div class="ig-url-text">${esc(label)}</div>
        </div>
      </div>
      <div class="yt-url-footer">
        <span>📸 Instagram — opens in new tab</span>
        <button class="remove-file" id="rm-yt">✕ Remove</button>
      </div>
    </div>`;
    ytPreviewEl.style.display = '';
    document.getElementById('rm-yt').addEventListener('click', () => {
      document.getElementById('form-youtube').value = '';
      ytPreviewEl.style.display = 'none';
      ytPreviewEl.innerHTML = '';
      if (isExisting) editFileRemoved = true;
    });
  }

  document.getElementById('form-youtube').addEventListener('input', function() {
    const val = this.value.trim();
    const vid = extractYouTubeId(val);
    const ytPreviewEl = document.getElementById('yt-preview');
    if (vid) {
      showYtPreview(vid, val);
    } else if (isInstagramUrl(val)) {
      showIgPreview(val);
    } else {
      ytPreviewEl.style.display = 'none';
      ytPreviewEl.innerHTML = '';
    }
  });

  // ── Boot ─────────────────────────────────────────────────
  async function init() {
    await loadCategories();
    await Promise.all([loadIdeas(), loadSmartFolders()]);
  }
  init();
</script>
</body>
</html>
