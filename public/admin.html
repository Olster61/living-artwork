<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Artwork — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080808;
    --bg2:       #111111;
    --bg3:       #181818;
    --card:      #141414;
    --gold:      #c9a84c;
    --gold-lt:   #e8c97a;
    --gold-dk:   #8b6914;
    --gold-bg:   rgba(201,168,76,0.07);
    --gold-bd:   rgba(201,168,76,0.18);
    --gold-bdh:  rgba(201,168,76,0.5);
    --text:      #f0ebe0;
    --text2:     #8a8070;
    --text3:     #554f45;
    --err:       #d9534f;
    --ok:        #5cb85c;
    --radius:    12px;
    --radius-sm: 8px;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 24px;
    padding: 0 32px;
    height: 64px;
    background: rgba(8,8,8,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gold-bd);
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 22px;
    background: linear-gradient(135deg, var(--gold-lt), var(--gold), var(--gold-dk));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .nav-sep { flex: 1; }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  aside {
    width: 240px;
    min-width: 240px;
    background: var(--bg2);
    border-right: 1px solid var(--gold-bd);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 20px 20px 12px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text2);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .customer-list { flex: 1; padding: 8px; }

  .customer-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    color: var(--text2);
    font-size: 13px;
  }

  .customer-item:hover { background: var(--gold-bg); color: var(--text); }

  .customer-item.active {
    background: var(--gold-bg);
    color: var(--gold-lt);
    border: 1px solid var(--gold-bd);
  }

  .customer-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gold-dk);
    flex-shrink: 0;
  }

  .customer-item.active .customer-dot { background: var(--gold); }

  .customer-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .customer-count {
    font-size: 11px;
    color: var(--text3);
    background: rgba(255,255,255,0.05);
    padding: 2px 6px;
    border-radius: 10px;
  }

  .sidebar-footer { padding: 12px; border-top: 1px solid rgba(255,255,255,0.04); }

  /* ── MAIN ── */
  main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .main-header {
    padding: 28px 36px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }

  .main-title-area { flex: 1; }

  .main-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 4px;
  }

  .main-subtitle {
    font-size: 12px;
    color: var(--text2);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  .main-actions { display: flex; gap: 10px; align-items: center; }

  .content-area { padding: 28px 36px; flex: 1; position: relative; }

  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 16px;
    padding: 80px 20px;
    color: var(--text3);
    text-align: center;
  }

  .empty-state svg { opacity: 0.3; }

  .empty-state p { font-size: 15px; color: var(--text2); }
  .empty-state span { font-size: 13px; }

  /* ── GRID ── */
  .artworks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }

  .artwork-card {
    background: var(--card);
    border: 1px solid var(--gold-bd);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.3s ease both;
  }

  .artwork-card:hover {
    border-color: var(--gold-bdh);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    background: var(--bg3);
    display: block;
  }

  .card-thumb-placeholder {
    width: 100%; aspect-ratio: 4/3;
    background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    color: var(--text3);
  }

  .card-body { padding: 14px; }

  .card-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .card-slug {
    font-size: 11px;
    color: var(--text3);
    font-family: monospace;
    margin-bottom: 12px;
  }

  .card-actions { display: flex; gap: 8px; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border: none; border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    white-space: nowrap;
  }

  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .btn-gold {
    background: linear-gradient(135deg, var(--gold-lt), var(--gold));
    color: #111;
  }
  .btn-gold:hover:not(:disabled) {
    background: linear-gradient(135deg, #f5d98a, var(--gold-lt));
    box-shadow: 0 0 20px rgba(201,168,76,0.35);
  }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--gold-bd);
    color: var(--text2);
  }
  .btn-outline:hover:not(:disabled) {
    border-color: var(--gold-bdh);
    color: var(--gold-lt);
    background: var(--gold-bg);
  }

  .btn-danger {
    background: transparent;
    border: 1px solid rgba(217,83,79,0.25);
    color: rgba(217,83,79,0.7);
    padding: 6px 12px;
    font-size: 12px;
  }
  .btn-danger:hover:not(:disabled) {
    background: rgba(217,83,79,0.1);
    border-color: var(--err);
    color: var(--err);
  }

  .btn-sm { padding: 6px 12px; font-size: 12px; }

  .btn-icon { padding: 7px; }

  /* ── INPUTS ── */
  .form-group { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 8px;
  }

  input[type=text], input[type=email], input[type=file], select {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg3);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type=text]:focus, input[type=email]:focus, select:focus {
    border-color: var(--gold-bd);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
  }

  input[type=file] { cursor: pointer; color: var(--text2); }

  .drop-zone {
    border: 2px dashed var(--gold-bd);
    border-radius: var(--radius-sm);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg3);
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--gold);
    background: var(--gold-bg);
  }
  .drop-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0;
    cursor: pointer; width: 100%; height: 100%;
  }
  .drop-zone-icon { font-size: 24px; margin-bottom: 6px; }
  .drop-zone-label { font-size: 12px; color: var(--text2); }
  .drop-zone-file { font-size: 12px; color: var(--gold); margin-top: 4px; font-weight: 500; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--gold-bd);
    border-radius: var(--radius);
    padding: 32px;
    width: 480px;
    max-width: calc(100vw - 32px);
    max-height: calc(100vh - 64px);
    overflow-y: auto;
    transform: scale(0.95) translateY(8px);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold-lt);
  }

  .modal-close {
    background: none; border: none; cursor: pointer;
    color: var(--text2); font-size: 20px; line-height: 1;
    transition: color 0.15s;
    padding: 4px;
  }
  .modal-close:hover { color: var(--text); }

  .modal-footer { margin-top: 24px; display: flex; justify-content: flex-end; gap: 10px; }

  /* ── COMPILE OVERLAY ── */
  .compile-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(8px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .compile-overlay.open { opacity: 1; pointer-events: all; }

  .compile-icon {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--gold-bg);
    border: 2px solid var(--gold-bd);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.3); }
    50% { box-shadow: 0 0 0 16px rgba(201,168,76,0); }
  }

  .compile-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--gold-lt);
  }

  .compile-status { font-size: 13px; color: var(--text2); min-height: 18px; }

  .progress-bar-wrap {
    width: 360px;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dk), var(--gold), var(--gold-lt));
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }

  @keyframes indeterminate {
    0%   { transform: translateX(-100%) scaleX(0.4); }
    50%  { transform: translateX(50%)   scaleX(0.6); }
    100% { transform: translateX(200%)  scaleX(0.4); }
  }

  /* ── TOASTS ── */
  #toasts {
    position: fixed; bottom: 24px; right: 24px;
    z-index: 500; display: flex; flex-direction: column; gap: 10px;
  }

  .toast {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 18px;
    border-radius: var(--radius-sm);
    background: var(--bg2);
    border: 1px solid var(--gold-bd);
    color: var(--text);
    font-size: 13px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    animation: slideIn 0.25s ease;
    max-width: 360px;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(24px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .toast.ok  { border-color: rgba(92,184,92,0.4);  }
  .toast.err { border-color: rgba(217,83,79,0.4); }
  .toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .toast.ok  .toast-dot { background: var(--ok); }
  .toast.err .toast-dot { background: var(--err); }
  .toast.info .toast-dot { background: var(--gold); }

  /* ── DIVIDER ── */
  .section-divider {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 0 20px;
    color: var(--text3);
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .section-divider::before, .section-divider::after {
    content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.05);
  }

  /* ── BULK UPLOAD ── */
  #bulk-modal .modal {
    width: 740px;
  }

  .bulk-drop-zone {
    border: 2px dashed var(--gold-bd);
    border-radius: var(--radius-sm);
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg3);
    position: relative;
    margin-bottom: 4px;
  }
  .bulk-drop-zone.drag-over {
    border-color: var(--gold);
    background: var(--gold-bg);
    transform: scale(1.005);
  }
  .bulk-drop-zone-icon { font-size: 32px; margin-bottom: 10px; }
  .bulk-drop-zone-label { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .bulk-drop-zone-sub   { font-size: 11px; color: var(--text3); margin-top: 6px; }
  .bulk-drop-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0;
    cursor: pointer; width: 100%; height: 100%;
  }

  .pair-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    max-height: 400px;
    overflow-y: auto;
    padding: 2px 2px 4px;
    margin-bottom: 4px;
  }

  .pair-card {
    background: var(--card);
    border: 1px solid var(--gold-bd);
    border-radius: var(--radius-sm);
    overflow: hidden;
    position: relative;
    transition: border-color 0.2s;
    animation: fadeUp 0.2s ease both;
  }
  .pair-card.status-done     { border-color: rgba(92,184,92,0.45); }
  .pair-card.status-error    { border-color: rgba(217,83,79,0.45); }
  .pair-card.status-uploading{ border-color: var(--gold); }

  .pair-thumb-wrap {
    position: relative;
    aspect-ratio: 4/3;
    background: var(--bg3);
    overflow: hidden;
  }
  .pair-thumb { width:100%; height:100%; object-fit:cover; display:block; }
  .pair-thumb-placeholder {
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    color:var(--text3); font-size:24px;
  }

  .pair-status-badge {
    position: absolute; top: 6px; right: 6px;
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .pair-card.status-done      .pair-status-badge { background: rgba(92,184,92,0.9);  color:#fff; }
  .pair-card.status-error     .pair-status-badge { background: rgba(217,83,79,0.9); color:#fff; }
  .pair-card.status-uploading .pair-status-badge {
    background: rgba(201,168,76,0.9);
    animation: spin 0.8s linear infinite;
  }

  .pair-info { padding: 8px 10px 10px; }
  .pair-name-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    color: var(--text);
    font-size: 12px; font-weight: 500;
    font-family: 'Inter', sans-serif;
    padding: 2px 0 4px;
    margin-bottom: 6px;
    outline: none;
    transition: border-color 0.15s;
  }
  .pair-name-input:focus { border-bottom-color: var(--gold-bd); }
  .pair-name-input:disabled { opacity: 0.5; }

  .pair-files { display: flex; flex-direction: column; gap: 3px; }
  .pair-files span {
    font-size: 10px; color: var(--text3);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pair-error { font-size: 10px; color: var(--err); margin-top: 4px; line-height: 1.4; }

  .pair-remove {
    position: absolute; top: 5px; left: 5px;
    width: 20px; height: 20px;
    background: rgba(0,0,0,0.65); border: none; border-radius: 50%;
    color: var(--text2); font-size: 11px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s, color 0.15s;
  }
  .pair-card:hover .pair-remove { opacity: 1; }
  .pair-remove:hover { color: var(--err); }

  .bulk-summary {
    font-size: 12px; color: var(--text2); padding: 8px 2px 0;
    display: flex; align-items: center; gap: 8px;
  }
  .bulk-count-badge {
    background: var(--gold-bg); border: 1px solid var(--gold-bd);
    color: var(--gold); border-radius: 10px;
    padding: 2px 8px; font-size: 11px; font-weight: 600;
  }

  /* ── UPLOAD PROGRESS ── */
  .upload-progress-wrap {
    margin-top: 16px;
    padding-bottom: 28px;
  }
  .upload-progress-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
    font-size: 13px; color: var(--text2);
  }
  .upload-spin-icon { color: var(--gold); animation: spin 1s linear infinite; flex-shrink: 0; }
  .upload-progress-text { flex: 1; }
  .upload-progress-pct { color: var(--gold); font-weight: 600; font-size: 13px; min-width: 36px; text-align: right; }
  .upload-progress-track {
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .upload-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dk), var(--gold), var(--gold-lt));
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  /* ── NAV UPLOAD BAR ── */
  #nav-upload { align-items: center; gap: 10px; min-width: 200px; }
  #nav-upload .upload-progress-track { margin-top: 4px; }

  /* ── GRID DROP ZONE ── */
  .drag-overlay {
    position: absolute;
    inset: 0;
    border: 2px dashed var(--gold-bd);
    border-radius: var(--radius);
    background: rgba(201,168,76,0.04);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    z-index: 10;
  }
  #artwork-grid-container.drag-over .drag-overlay { opacity: 1; }
  #artwork-grid-container.drag-over {
    box-shadow: 0 0 0 2px var(--gold-bd), 0 0 40px rgba(201,168,76,0.06);
    border-radius: var(--radius);
  }
  .drag-overlay-inner { text-align: center; }

  /* ── NO SELECTION ── */
  .no-selection {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; color: var(--text3); padding: 40px;
    text-align: center;
  }
  .no-selection h2 {
    font-family: 'Playfair Display', serif;
    font-style: italic; font-size: 24px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dk));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* spinner */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── CARD DELETE OVERLAY ── */
  .card-thumb-wrap {
    position: relative;
  }
  .card-delete-btn {
    position: absolute;
    top: 8px; right: 8px;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(180,40,40,0.82);
    border: none;
    color: #fff;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .artwork-card:hover .card-delete-btn { opacity: 1; }
  .card-delete-btn:hover { background: var(--err); }

  /* ── SCORE STAR ── */
  .score-star-btn {
    display: inline-flex; align-items: center; justify-content: center;
    background: none; border: none; cursor: pointer; padding: 1px;
    border-radius: 4px; transition: transform 0.15s;
    flex-shrink: 0;
  }
  .score-star-btn:hover { transform: scale(1.15); }

  /* Small play button */
  .btn-play { padding: 5px 9px; flex-shrink: 0; }

  /* Score panel */
  .score-panel {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .score-row {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 6px;
  }
  .score-row:last-child { margin-bottom: 0; }
  .score-label { font-size: 10px; color: var(--text2); width: 90px; flex-shrink: 0; }
  .score-val { font-size: 10px; font-weight: 600; width: 28px; text-align: right; flex-shrink: 0; }
  .score-bar-track {
    flex: 1; height: 3px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px; overflow: hidden;
  }
  .score-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
</style>
</head>
<body>

<!-- NAV -->
<nav>

<!-- LAYOUT -->

    <div class="progress-bar" id="progress-bar"></div>

<!-- TOASTS -->
<div id="toasts"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let customers = []
let currentCustomer = null
let artworks = []
let artworkCounts = {}
let bulkPairs = []   // [{id, name, slug, triggerFile, videoFile, thumbUrl, status, error}]
let _uploadCancelled = false

// ── API ───────────────────────────────────────────────────────────────────────
async function api (method, url, body) {
  const opts = { method }
  if (body instanceof FormData) {
    opts.body = body
  } else if (body) {
    opts.headers = { 'Content-Type': 'application/json' }
    opts.body = JSON.stringify(body)
  }
  const res = await fetch(url, opts)
  const data = await res.json().catch(() => ({}))
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`)
  return data
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init () {
  try {
    customers = await api('GET', '/api/customers')
    renderSidebar()
    if (customers.length > 0) selectCustomer(customers[0])
  } catch (e) {
    document.getElementById('customer-list').innerHTML =
      `<div style="padding:16px;color:var(--err);font-size:12px">Failed to load: ${e.message}<br><br>Is the server running?</div>`
  }
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar () {
  const list = document.getElementById('customer-list')
  if (!customers.length) {
    list.innerHTML = `<div style="padding:20px 12px;color:var(--text3);font-size:12px;text-align:center">No customers yet.<br>Create one to get started.</div>`
    return
  }
  list.innerHTML = customers.map((c, i) => `
    <div class="customer-item ${currentCustomer?.id === c.id ? 'active' : ''}" onclick="selectCustomerByIndex(${i})">
      <div class="customer-dot"></div>
      <div class="customer-name">${esc(c.name)}</div>
      <div class="customer-count">${artworkCounts[c.id] ?? '…'}</div>
    </div>
  `).join('')
}

function selectCustomerByIndex (i) {
  selectCustomer(customers[i])
}

async function selectCustomer (customer) {
  currentCustomer = customer
  bulkPairs = []

  renderSidebar()
  renderMain('loading')

  try {
    const { artworks: list } = await api('GET', `/api/customer/${customer.slug}/artworks`)
    artworks = list || []
    artworkCounts[customer.id] = artworks.length
    renderSidebar()
    renderMain('artworks')
  } catch (e) {
    renderMain('error', e.message)
  }
}

// ── Main area ─────────────────────────────────────────────────────────────────
function renderMain (state, msg) {
  const main = document.getElementById('main')

  if (state === 'loading') {
    main.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;"><div class="spinner"></div></div>`
    return
  }

  if (state === 'error') {
    main.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--err);font-size:13px;padding:40px;text-align:center;">${esc(msg || 'Error')}</div>`
    return
  }

  const mindUrl = `https://adwluvwvemzrfpgukhtc.supabase.co/storage/v1/object/public/minds/customers/${currentCustomer.slug}/targets.mind`

  main.innerHTML = `
    <div class="main-header">
      <div class="main-title-area">
        <div class="main-title">${esc(currentCustomer.name)}</div>
        <div class="main-subtitle">
          slug: <span style="font-family:monospace;color:var(--gold)">${esc(currentCustomer.slug)}</span>
          &nbsp;·&nbsp;
          ${artworks.length} artwork${artworks.length !== 1 ? 's' : ''}
        </div>
      </div>
      <div class="main-actions">
        <button class="btn btn-outline btn-sm" onclick="copyToClipboard('${mindUrl}')" title="Copy .mind file URL">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy .mind URL
        </button>
        <button class="btn btn-gold btn-sm" onclick="publishTargets()" id="publish-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          Publish
        </button>
        <button class="btn btn-gold btn-sm" onclick="openArtworkFilePicker()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Artwork
        </button>
      </div>
    </div>
    <div class="content-area" id="artwork-grid-container">
      <div class="drag-overlay">
        <div class="drag-overlay-inner">
          <div style="font-size:32px;margin-bottom:12px">📂</div>
          <div style="font-size:14px;color:var(--gold-lt);font-weight:500">Drop folders or files to upload</div>
          <div style="font-size:12px;color:var(--text2);margin-top:6px">Folders — one trigger + one MP4 &nbsp;·&nbsp; Files — paired by filename</div>
        </div>
      </div>
      ${renderArtworksHTML()}
      <div id="staging-area"></div>
    </div>
  `
  attachGridDropzone()
  if (bulkPairs.length) renderStagingArea()
}

function renderArtworksHTML () {
  if (!artworks.length) {
    return `
      <div class="empty-state">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21,15 16,10 5,21"/>
        </svg>
        <p>No artworks yet</p>
        <span>Drop files onto this area or use Add Artwork to get started</span>
        <button class="btn btn-gold" style="margin-top:8px" onclick="openArtworkFilePicker()">Add First Artwork</button>
      </div>
    `
  }
  return `<div class="artworks-grid">${artworks.map(artworkCardHTML).join('')}</div>`
}

function starColor (score) {
  if (score == null) return '#444'
  if (score >= 8) return '#4caf50'
  if (score >= 5) return '#ff9800'
  return '#f44336'
}

function scorePanelHTML (a) {
  const rows = [
    ['Feature Points', a.score_features],
    ['Distribution',   a.score_distribution],
    ['Contrast',       a.score_contrast],
    ['Uniqueness',     a.score_uniqueness]
  ]
  return rows.map(([label, val]) => {
    const pct   = val != null ? val / 10 * 100 : 0
    const color = val != null ? starColor(val) : '#444'
    return `<div class="score-row">
      <span class="score-label">${label}</span>
      <span class="score-val" style="color:${color}">${val != null ? val + '/10' : '—'}</span>
      <div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`
  }).join('')
}

function artworkCardHTML (a) {
  const thumb = a.trigger_url
    ? `<img class="card-thumb" src="${esc(a.trigger_url)}" alt="${esc(a.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : ''
  const placeholder = `<div class="card-thumb-placeholder" ${a.trigger_url ? 'style="display:none"' : ''}>
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3">
      <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/>
    </svg>
  </div>`

  const score    = a.score_total
  const sc       = starColor(score)
  const scoreNum = score != null ? Math.round(score) : '?'
  const fontSize = scoreNum === 10 ? 5 : 7

  const starBtn = `<button class="score-star-btn" onclick="toggleScorePanel('${a.id}')" title="Trackability score: ${scoreNum}/10">
    <svg width="28" height="28" viewBox="0 0 24 24">
      <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"
        fill="${sc}" stroke="${sc}" stroke-width="0.5"/>
      <text x="12" y="13" text-anchor="middle" dominant-baseline="middle"
        fill="white" font-size="${fontSize}" font-weight="800" font-family="Arial,sans-serif">${scoreNum}</text>
    </svg>
  </button>`

  const playBtn = a.video_url
    ? `<a href="${esc(a.video_url)}" target="_blank" class="btn btn-outline btn-play" title="Play video">
        <svg width="9" height="10" viewBox="0 0 9 10" fill="currentColor"><polygon points="0,0 9,5 0,10"/></svg>
      </a>`
    : ''

  return `
    <div class="artwork-card" data-id="${a.id}">
      <div class="card-thumb-wrap">
        ${thumb}${placeholder}
        <button class="card-delete-btn" onclick="deleteArtwork('${a.id}','${esc(a.name)}')" title="Delete">✕</button>
      </div>
      <div class="card-body">
        <div class="card-name">${esc(a.name)}</div>
        <div class="card-slug">${esc(a.slug)}</div>
        <div class="card-actions">
          ${starBtn}
          ${playBtn}
        </div>
        <div class="score-panel" id="score-panel-${a.id}" style="display:none">
          ${scorePanelHTML(a)}
        </div>
      </div>
    </div>
  `
}

// ── Grid drop zone ────────────────────────────────────────────────────────────
function attachGridDropzone () {
  const container = document.getElementById('artwork-grid-container')
  if (!container) return

  container.addEventListener('dragenter', e => { e.preventDefault(); container.classList.add('drag-over') })
  container.addEventListener('dragleave', e => {
    if (!container.contains(e.relatedTarget)) container.classList.remove('drag-over')
  })
  container.addEventListener('dragover', e => e.preventDefault())
  container.addEventListener('drop', e => {
    e.preventDefault()
    container.classList.remove('drag-over')
    handleGridDrop(e)
  })
}

async function handleGridDrop (e) {
  if (!currentCustomer) { toast('Select a customer first', 'err'); return }

  const items   = Array.from(e.dataTransfer.items)
  const entries = items.map(i => i.webkitGetAsEntry ? i.webkitGetAsEntry() : null).filter(Boolean)
  const hasFolders = entries.some(en => en.isDirectory)

  if (hasFolders) {
    for (const entry of entries) {
      if (entry.isDirectory) {
        const files = await readDirFiles(entry)
        const pair  = buildPairFromFiles(entry.name, files)
        if (pair) bulkPairs.push(pair)
        else toast(`"${entry.name}": need one image + one MP4`, 'err')
      }
    }
  } else {
    const files = []
    for (const entry of entries) {
      if (entry.isFile) files.push(await fileFromEntry(entry))
    }
    const pairs = pairIndividualFiles(files)
    const unpaired = files.filter(f => !pairs.some(p => p.triggerFile === f || p.videoFile === f))
    pairs.forEach(p => bulkPairs.push(p))
    if (unpaired.length) toast(`${unpaired.length} file(s) had no matching pair and were skipped`, 'info')
  }

  renderStagingArea()
  uploadAllPairs()
}

// ── Staging area (inline below artwork grid) ──────────────────────────────────
function renderStagingArea () {
  const area = document.getElementById('staging-area')
  if (!area) return
  if (!bulkPairs.length) { area.innerHTML = ''; return }
  area.innerHTML = `
    <div class="section-divider" style="margin-top:28px">Uploading</div>
    <div class="pair-grid" style="padding-bottom:28px">${bulkPairs.map(pairCardHTML).join('')}</div>
  `
}

// ── Nav upload bar ────────────────────────────────────────────────────────────
function showNavUpload (pct) {
  const bar = document.getElementById('nav-upload')
  if (!bar) return
  bar.style.display = 'flex'
  document.getElementById('nav-upload-spin').style.display = 'block'
  document.getElementById('nav-upload-text').textContent = 'Uploading…'
  document.getElementById('nav-upload-pct').textContent  = pct + '%'
  document.getElementById('nav-upload-fill').style.width = pct + '%'
}

function completeNavUpload (successCount) {
  const bar = document.getElementById('nav-upload')
  if (!bar) return
  document.getElementById('nav-upload-spin').style.display = 'none'
  document.getElementById('nav-upload-text').textContent =
    `✓ ${successCount} artwork${successCount !== 1 ? 's' : ''} uploaded`
  document.getElementById('nav-upload-pct').textContent  = ''
  document.getElementById('nav-upload-fill').style.width = '100%'
  setTimeout(() => { bar.style.display = 'none' }, 3000)
}

function pairCardHTML (p) {
  const locked = p.status !== 'pending'
  const badge  = p.status === 'uploading' ? '↻' : p.status === 'done' ? '✓' : p.status === 'error' ? '✗' : ''
  return `
    <div class="pair-card status-${p.status}" data-id="${esc(p.id)}">
      <div class="pair-thumb-wrap">
        <img class="pair-thumb" src="${esc(p.thumbUrl)}" alt="" onerror="this.style.display='none'">
        ${badge ? `<div class="pair-status-badge">${badge}</div>` : ''}
      </div>
      ${!locked ? `<button class="pair-remove" onclick="removeBulkPair('${esc(p.id)}')" title="Remove">✕</button>` : ''}
      <div class="pair-info">
        <input class="pair-name-input" value="${esc(p.name)}"
          ${locked ? 'disabled' : `onchange="updatePairName('${esc(p.id)}',this.value)"`}
          title="Artwork name (editable)">
        <div class="pair-files">
          <span title="${esc(p.triggerFile.name)}">🖼 ${esc(p.triggerFile.name)}</span>
          <span title="${esc(p.videoFile.name)}">🎬 ${esc(p.videoFile.name)} · ${(p.videoFile.size/1024/1024).toFixed(1)} MB</span>
        </div>
        ${p.error ? `<div class="pair-error">${esc(p.error)}</div>` : ''}
      </div>
    </div>`
}

// ── Customer CRUD ─────────────────────────────────────────────────────────────
document.getElementById('cust-name').addEventListener('input', function () {
  const slug = document.getElementById('cust-slug')
  if (!slug.dataset.manual) slug.value = slugify(this.value)
})
document.getElementById('cust-slug').addEventListener('input', function () {
  this.dataset.manual = this.value ? '1' : ''
})

async function submitCustomer () {
  const name = document.getElementById('cust-name').value.trim()
  const slug = document.getElementById('cust-slug').value.trim()
  if (!name || !slug) { toast('Name and slug are required', 'err'); return }

  const btn = document.getElementById('cust-submit-btn')
  btn.disabled = true; btn.textContent = 'Creating…'

  try {
    const customer = await api('POST', '/api/customer', { name, slug })
    customers.push(customer)
    artworkCounts[customer.id] = 0
    closeModal('customer-modal')
    document.getElementById('cust-name').value = ''
    document.getElementById('cust-slug').value = ''
    delete document.getElementById('cust-slug').dataset.manual
    await selectCustomer(customer)
    toast(`Customer "${name}" created`, 'ok')
  } catch (e) {
    toast(e.message, 'err')
  } finally {
    btn.disabled = false; btn.textContent = 'Create Customer'
  }
}

// ── Artwork CRUD ──────────────────────────────────────────────────────────────
function openArtworkFilePicker () {
  if (!currentCustomer) { toast('Select a customer first', 'err'); return }
  const input = document.createElement('input')
  input.type = 'file'
  input.multiple = true
  input.accept = 'image/*,video/mp4,.mp4'
  input.onchange = () => {
    if (!input.files.length) return
    const files = Array.from(input.files)
    const pairs = pairIndividualFiles(files)
    const unpaired = files.filter(f => !pairs.some(p => p.triggerFile === f || p.videoFile === f))
    pairs.forEach(p => bulkPairs.push(p))
    if (unpaired.length) toast(`${unpaired.length} file(s) had no matching pair and were skipped`, 'info')
    if (!pairs.length) { toast('No matching image/video pairs found', 'err'); return }
    renderStagingArea()
    uploadAllPairs()
  }
  input.click()
}

async function deleteArtwork (id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return
  try {
    await api('DELETE', `/api/artwork/${id}`)
    artworks = artworks.filter(a => a.id !== id)
    artworkCounts[currentCustomer.id] = Math.max(0, (artworkCounts[currentCustomer.id] || 1) - 1)
    renderMain('artworks')
    renderSidebar()
    toast(`"${name}" deleted`, 'ok')
  } catch (e) {
    toast(e.message, 'err')
  }
}

// ── Publish (browser-side MindAR compilation + upload) ───────────────────────
let _publishing = false
let _pubNavTimer = null

// mindar-image.prod.js is an ES module that sets window.MINDAR as a side effect.
// dynamic import() executes it properly; a plain <script> tag won't run ES modules.
let _mindarLoaded = false
async function loadMindAR () {
  if (_mindarLoaded) return
  await import('https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js')
  if (!window.MINDAR?.IMAGE?.Compiler) throw new Error('MINDAR.IMAGE.Compiler not found after import')
  _mindarLoaded = true
}

function loadImage (url) {
  return new Promise((resolve, reject) => {
    const img = new Image()
    img.crossOrigin = 'anonymous'
    img.onload  = () => resolve(img)
    img.onerror = () => reject(new Error('Could not load image: ' + url))
    img.src = url
  })
}

function showPubNav (pct, label) {
  if (_pubNavTimer) { clearTimeout(_pubNavTimer); _pubNavTimer = null }
  const bar = document.getElementById('nav-upload')
  if (!bar) return
  bar.style.display = 'flex'
  document.getElementById('nav-upload-spin').style.display = 'block'
  document.getElementById('nav-upload-text').textContent = label || 'Compiling…'
  document.getElementById('nav-upload-pct').textContent  = pct + '%'
  document.getElementById('nav-upload-fill').style.width = pct + '%'
}

function endPubNav (label, isError) {
  const bar = document.getElementById('nav-upload')
  if (!bar) return
  document.getElementById('nav-upload-spin').style.display = 'none'
  document.getElementById('nav-upload-text').textContent = label
  document.getElementById('nav-upload-pct').textContent  = ''
  document.getElementById('nav-upload-fill').style.width = isError ? '0%' : '100%'
  _pubNavTimer = setTimeout(() => { bar.style.display = 'none' }, isError ? 3000 : 5000)
}

async function publishTargets () {
  if (!currentCustomer || _publishing) return
  if (!artworks.length) { toast('No artworks to publish', 'err'); return }

  _publishing = true
  const btn = document.getElementById('publish-btn')
  if (btn) btn.disabled = true

  const slug  = currentCustomer.slug
  const count = artworks.length

  try {
    // 1. Load MindAR compiler from CDN (cached after first load)
    showPubNav(2, 'Loading compiler…')
    await loadMindAR()

    // 2. Fetch all trigger images for this customer
    showPubNav(8, `Fetching ${count} image${count !== 1 ? 's' : ''}…`)
    const images = await Promise.all(artworks.map(a => loadImage(a.trigger_url)))

    // 3. Compile in-browser using MindAR
    showPubNav(15, 'Compiling…')
    const compiler = new MINDAR.IMAGE.Compiler()
    await compiler.compileImageTargets(images, progress => {
      showPubNav(15 + Math.round(progress * 0.75), 'Compiling…')
    })

    // 4. Export compiled buffer
    showPubNav(92, 'Exporting…')
    const exportedBuffer = await compiler.exportData()

    // 5. Upload targets.mind to Supabase via server
    showPubNav(96, 'Uploading targets.mind…')
    const fd = new FormData()
    fd.append('mind', new Blob([exportedBuffer], { type: 'application/octet-stream' }), 'targets.mind')
    await api('POST', `/api/compile/${slug}/upload`, fd)

    // 6. Done
    endPubNav(`Published! ${count} artwork${count !== 1 ? 's' : ''} live`)
    toast(`Published — ${count} target${count !== 1 ? 's' : ''} live ✓`, 'ok')

  } catch (e) {
    endPubNav('Publish failed', true)
    toast('Publish failed: ' + e.message, 'err')
    console.error('Publish error:', e)
  } finally {
    _publishing = false
    if (btn) btn.disabled = false
  }
}

// ── Bulk pair logic ───────────────────────────────────────────────────────────
function readDirFiles (dirEntry) {
  return new Promise(resolve => {
    const reader = dirEntry.createReader()
    const all    = []
    const batch  = () => {
      reader.readEntries(async entries => {
        if (!entries.length) { resolve(all); return }
        for (const en of entries) {
          if (en.isFile) all.push(await fileFromEntry(en))
        }
        batch()
      }, () => resolve(all))
    }
    batch()
  })
}

function fileFromEntry (entry) {
  return new Promise((ok, fail) => entry.file(ok, fail))
}

function buildPairFromFiles (folderName, files) {
  const image = files.find(f => /\.(png|jpe?g|webp)$/i.test(f.name))
  const video = files.find(f => /\.mp4$/i.test(f.name))
  if (!image || !video) return null
  return makePair(folderName, image, video)
}

function commonPrefix (a, b) {
  let i = 0
  while (i < a.length && i < b.length && a[i] === b[i]) i++
  return a.slice(0, i)
}

function pairIndividualFiles (files) {
  const images = files.filter(f => /\.(png|jpe?g|webp)$/i.test(f.name))
  const videos = files.filter(f => /\.mp4$/i.test(f.name))

  // Score every image×video combination by shared prefix length
  const candidates = []
  for (const img of images) {
    const imgStem = img.name.replace(/\.[^.]+$/, '').toLowerCase()
    for (const vid of videos) {
      const vidStem = vid.name.replace(/\.[^.]+$/, '').toLowerCase()
      const prefix  = commonPrefix(imgStem, vidStem)
      // Require prefix to cover at least 50% of both names
      if (prefix.length >= imgStem.length * 0.5 &&
          prefix.length >= vidStem.length * 0.5) {
        candidates.push({ img, vid, prefix, len: prefix.length })
      }
    }
  }
  // Greedily pick best-scoring pairs first
  candidates.sort((a, b) => b.len - a.len)
  const usedImgs = new Set()
  const usedVids = new Set()
  const pairs    = []
  for (const { img, vid, prefix } of candidates) {
    if (usedImgs.has(img) || usedVids.has(vid)) continue
    usedImgs.add(img); usedVids.add(vid)
    const name = prefix.replace(/[-_\s]+$/, '') || img.name.replace(/\.[^.]+$/, '')
    pairs.push(makePair(name, img, vid))
  }
  return pairs
}

function makePair (name, imageFile, videoFile) {
  return {
    id:          Math.random().toString(36).slice(2),
    name:        name,
    slug:        slugify(name),
    triggerFile: imageFile,
    videoFile:   videoFile,
    thumbUrl:    URL.createObjectURL(imageFile),
    status:      'pending',
    error:       null
  }
}

function removeBulkPair (id) {
  const p = bulkPairs.find(p => p.id === id)
  if (p?.thumbUrl) URL.revokeObjectURL(p.thumbUrl)
  bulkPairs = bulkPairs.filter(p => p.id !== id)
  renderStagingArea()
}

function updatePairName (id, val) {
  const p = bulkPairs.find(p => p.id === id)
  if (p) { p.name = val.trim() || p.name; p.slug = slugify(p.name) }
}

function cancelUpload () {
  _uploadCancelled = true
}

async function uploadAllPairs () {
  if (!currentCustomer) return

  const pending = bulkPairs.filter(p => p.status === 'pending')
  if (!pending.length) return

  _uploadCancelled = false
  const total      = pending.length
  let successCount = 0
  let errorCount   = 0

  showNavUpload(0)

  for (const pair of pending) {
    if (_uploadCancelled) break

    pair.status = 'uploading'
    renderStagingArea()

    try {
      const fd = new FormData()
      fd.append('customer_slug', currentCustomer.slug)
      fd.append('artwork_name',  pair.name)
      fd.append('artwork_slug',  pair.slug)
      fd.append('trigger',       pair.triggerFile)
      fd.append('video',         pair.videoFile)

      const artwork = await api('POST', '/api/artwork/upload', fd)
      artworks.push(artwork)
      artworkCounts[currentCustomer.id] = (artworkCounts[currentCustomer.id] || 0) + 1
      pair.status = 'done'
      successCount++
    } catch (e) {
      pair.status = 'error'
      pair.error  = e.message
      errorCount++
    }

    showNavUpload(Math.round(((successCount + errorCount) / total) * 100))
    renderStagingArea()
  }

  if (_uploadCancelled) {
    bulkPairs = bulkPairs.filter(p => p.status !== 'pending')
    const bar = document.getElementById('nav-upload')
    if (bar) bar.style.display = 'none'
    document.getElementById('nav-upload-fill').style.width = '0%'
    renderMain('artworks')
    renderSidebar()
    if (successCount) toast(`${successCount} artwork${successCount !== 1 ? 's' : ''} uploaded`, 'ok')
    toast('Upload cancelled', 'info')
    return
  }

  bulkPairs = []
  renderMain('artworks')
  renderSidebar()

  if (successCount) completeNavUpload(successCount)
  if (errorCount)   toast(`${errorCount} upload${errorCount !== 1 ? 's' : ''} failed`, 'err')
}

// ── Score panel ───────────────────────────────────────────────────────────────
function toggleScorePanel (id) {
  const panel = document.getElementById('score-panel-' + id)
  if (panel) panel.style.display = panel.style.display === 'none' ? 'block' : 'none'
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function esc (s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function slugify (s) {
  return s.toLowerCase().trim()
    .replace(/[^a-z0-9\s-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
}

function toast (msg, type) {
  const el = document.createElement('div')
  el.className = `toast ${type}`
  el.innerHTML = `<div class="toast-dot"></div><span>${esc(msg)}</span>`
  document.getElementById('toasts').appendChild(el)
  setTimeout(() => el.remove(), 4000)
}

function openModal (id) {
  document.getElementById(id).classList.add('open')
}

function closeModal (id) {
  document.getElementById(id).classList.remove('open')
}

function copyToClipboard (text) {
  navigator.clipboard.writeText(text).then(() => toast('URL copied to clipboard', 'ok'))
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open') })
})

// Drag-over styling for single-artwork upload drop zones
document.querySelectorAll('.drop-zone').forEach(zone => {
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over') })
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'))
  zone.addEventListener('drop', () => zone.classList.remove('drag-over'))
})

// ── Boot ──────────────────────────────────────────────────────────────────────
init()
</script>
