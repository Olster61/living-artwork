<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Artwork — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080808;
    --bg2:       #111111;
    --bg3:       #181818;
    --card:      #141414;
    --gold:      #c9a84c;
    --gold-lt:   #e8c97a;
    --gold-dk:   #8b6914;
    --gold-bg:   rgba(201,168,76,0.07);
    --gold-bd:   rgba(201,168,76,0.18);
    --gold-bdh:  rgba(201,168,76,0.5);
    --text:      #f0ebe0;
    --text2:     #8a8070;
    --text3:     #554f45;
    --err:       #d9534f;
    --ok:        #5cb85c;
    --radius:    12px;
    --radius-sm: 8px;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 24px;
    padding: 0 32px;
    height: 64px;
    background: rgba(8,8,8,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gold-bd);
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 22px;
    background: linear-gradient(135deg, var(--gold-lt), var(--gold), var(--gold-dk));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .nav-sep { flex: 1; }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  aside {
    width: 240px;
    min-width: 240px;
    background: var(--bg2);
    border-right: 1px solid var(--gold-bd);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 20px 20px 12px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text2);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .customer-list { flex: 1; padding: 8px; }

  .customer-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    color: var(--text2);
    font-size: 13px;
  }

  .customer-item:hover { background: var(--gold-bg); color: var(--text); }

  .customer-item.active {
    background: var(--gold-bg);
    color: var(--gold-lt);
    border: 1px solid var(--gold-bd);
  }

  .customer-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gold-dk);
    flex-shrink: 0;
  }

  .customer-item.active .customer-dot { background: var(--gold); }

  .customer-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .customer-count {
    font-size: 11px;
    color: var(--text3);
    background: rgba(255,255,255,0.05);
    padding: 2px 6px;
    border-radius: 10px;
  }

  .sidebar-footer { padding: 12px; border-top: 1px solid rgba(255,255,255,0.04); }

  /* ── MAIN ── */
  main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .main-header {
    padding: 28px 36px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }

  .main-title-area { flex: 1; }

  .main-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 4px;
  }

  .main-subtitle {
    font-size: 12px;
    color: var(--text2);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  .main-actions { display: flex; gap: 10px; align-items: center; }

  .content-area { padding: 28px 36px; flex: 1; }

  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 16px;
    padding: 80px 20px;
    color: var(--text3);
    text-align: center;
  }

  .empty-state svg { opacity: 0.3; }

  .empty-state p { font-size: 15px; color: var(--text2); }
  .empty-state span { font-size: 13px; }

  /* ── GRID ── */
  .artworks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }

  .artwork-card {
    background: var(--card);
    border: 1px solid var(--gold-bd);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.3s ease both;
  }

  .artwork-card:hover {
    border-color: var(--gold-bdh);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    background: var(--bg3);
    display: block;
  }

  .card-thumb-placeholder {
    width: 100%; aspect-ratio: 4/3;
    background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    color: var(--text3);
  }

  .card-body { padding: 14px; }

  .card-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .card-slug {
    font-size: 11px;
    color: var(--text3);
    font-family: monospace;
    margin-bottom: 12px;
  }

  .card-actions { display: flex; gap: 8px; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border: none; border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    white-space: nowrap;
  }

  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .btn-gold {
    background: linear-gradient(135deg, var(--gold-lt), var(--gold));
    color: #111;
  }
  .btn-gold:hover:not(:disabled) {
    background: linear-gradient(135deg, #f5d98a, var(--gold-lt));
    box-shadow: 0 0 20px rgba(201,168,76,0.35);
  }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--gold-bd);
    color: var(--text2);
  }
  .btn-outline:hover:not(:disabled) {
    border-color: var(--gold-bdh);
    color: var(--gold-lt);
    background: var(--gold-bg);
  }

  .btn-danger {
    background: transparent;
    border: 1px solid rgba(217,83,79,0.25);
    color: rgba(217,83,79,0.7);
    padding: 6px 12px;
    font-size: 12px;
  }
  .btn-danger:hover:not(:disabled) {
    background: rgba(217,83,79,0.1);
    border-color: var(--err);
    color: var(--err);
  }

  .btn-sm { padding: 6px 12px; font-size: 12px; }

  .btn-icon { padding: 7px; }

  /* ── INPUTS ── */
  .form-group { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 8px;
  }

  input[type=text], input[type=email], input[type=file], select {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg3);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type=text]:focus, input[type=email]:focus, select:focus {
    border-color: var(--gold-bd);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
  }

  input[type=file] { cursor: pointer; color: var(--text2); }

  .drop-zone {
    border: 2px dashed var(--gold-bd);
    border-radius: var(--radius-sm);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg3);
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--gold);
    background: var(--gold-bg);
  }
  .drop-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0;
    cursor: pointer; width: 100%; height: 100%;
  }
  .drop-zone-icon { font-size: 24px; margin-bottom: 6px; }
  .drop-zone-label { font-size: 12px; color: var(--text2); }
  .drop-zone-file { font-size: 12px; color: var(--gold); margin-top: 4px; font-weight: 500; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--gold-bd);
    border-radius: var(--radius);
    padding: 32px;
    width: 480px;
    max-width: calc(100vw - 32px);
    max-height: calc(100vh - 64px);
    overflow-y: auto;
    transform: scale(0.95) translateY(8px);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold-lt);
  }

  .modal-close {
    background: none; border: none; cursor: pointer;
    color: var(--text2); font-size: 20px; line-height: 1;
    transition: color 0.15s;
    padding: 4px;
  }
  .modal-close:hover { color: var(--text); }

  .modal-footer { margin-top: 24px; display: flex; justify-content: flex-end; gap: 10px; }

  /* ── COMPILE OVERLAY ── */
  .compile-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(8px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .compile-overlay.open { opacity: 1; pointer-events: all; }

  .compile-icon {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--gold-bg);
    border: 2px solid var(--gold-bd);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.3); }
    50% { box-shadow: 0 0 0 16px rgba(201,168,76,0); }
  }

  .compile-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--gold-lt);
  }

  .compile-status { font-size: 13px; color: var(--text2); min-height: 18px; }

  .progress-bar-wrap {
    width: 360px;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dk), var(--gold), var(--gold-lt));
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }

  @keyframes indeterminate {
    0%   { transform: translateX(-100%) scaleX(0.4); }
    50%  { transform: translateX(50%)   scaleX(0.6); }
    100% { transform: translateX(200%)  scaleX(0.4); }
  }

  /* ── TOASTS ── */
  #toasts {
    position: fixed; bottom: 24px; right: 24px;
    z-index: 500; display: flex; flex-direction: column; gap: 10px;
  }

  .toast {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 18px;
    border-radius: var(--radius-sm);
    background: var(--bg2);
    border: 1px solid var(--gold-bd);
    color: var(--text);
    font-size: 13px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    animation: slideIn 0.25s ease;
    max-width: 360px;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(24px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .toast.ok  { border-color: rgba(92,184,92,0.4);  }
  .toast.err { border-color: rgba(217,83,79,0.4); }
  .toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .toast.ok  .toast-dot { background: var(--ok); }
  .toast.err .toast-dot { background: var(--err); }
  .toast.info .toast-dot { background: var(--gold); }

  /* ── DIVIDER ── */
  .section-divider {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 0 20px;
    color: var(--text3);
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .section-divider::before, .section-divider::after {
    content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.05);
  }

  /* ── NO SELECTION ── */
  .no-selection {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; color: var(--text3); padding: 40px;
    text-align: center;
  }
  .no-selection h2 {
    font-family: 'Playfair Display', serif;
    font-style: italic; font-size: 24px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dk));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* spinner */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">Living Artwork</div>
  <span style="font-size:11px;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;">Admin Panel</span>
  <div class="nav-sep"></div>
  <button class="btn btn-outline btn-sm" onclick="openModal('customer-modal')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New Customer
  </button>
</nav>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside>
    <div class="sidebar-header">Customers</div>
    <div class="customer-list" id="customer-list">
      <div style="padding:20px;text-align:center;"><div class="spinner" style="margin:auto"></div></div>
    </div>
    <div class="sidebar-footer">
      <div style="font-size:11px;color:var(--text3);line-height:1.5;text-align:center;">
        Living Artwork<br>Admin v1.0
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <div class="no-selection">
      <h2>Living Artwork</h2>
      <p style="font-size:14px;color:var(--text2)">Select a customer from the sidebar<br>or create a new one to get started.</p>
      <button class="btn btn-gold" onclick="openModal('customer-modal')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add First Customer
      </button>
    </div>
  </main>

</div>

<!-- MODAL: Add Customer -->
<div class="modal-overlay" id="customer-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">New Customer</div>
      <button class="modal-close" onclick="closeModal('customer-modal')">✕</button>
    </div>
    <div class="form-group">
      <label>Customer Name</label>
      <input type="text" id="cust-name" placeholder="e.g. Owl Sanctuary" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Slug <span style="color:var(--text3);font-weight:300;text-transform:none;letter-spacing:0;">(used in URLs, auto-generated)</span></label>
      <input type="text" id="cust-slug" placeholder="e.g. owl-sanctuary" autocomplete="off">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('customer-modal')">Cancel</button>
      <button class="btn btn-gold" id="cust-submit-btn" onclick="submitCustomer()">Create Customer</button>
    </div>
  </div>
</div>

<!-- MODAL: Add Artwork -->
<div class="modal-overlay" id="artwork-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Artwork</div>
      <button class="modal-close" onclick="closeModal('artwork-modal')">✕</button>
    </div>
    <div class="form-group">
      <label>Artwork Name</label>
      <input type="text" id="art-name" placeholder="e.g. Owl in Flight" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Slug <span style="color:var(--text3);font-weight:300;text-transform:none;letter-spacing:0;">(auto-generated)</span></label>
      <input type="text" id="art-slug" placeholder="e.g. owl-in-flight" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Trigger Image <span style="color:var(--text3);font-weight:300;text-transform:none;letter-spacing:0;">(PNG/JPG — the AR marker)</span></label>
      <div class="drop-zone" id="trigger-dropzone">
        <input type="file" id="art-trigger" accept="image/*" onchange="handleFileSelect(this,'trigger-dropzone','trigger-file-name')">
        <div class="drop-zone-icon">🖼</div>
        <div class="drop-zone-label">Drop image here or click to browse</div>
        <div class="drop-zone-file" id="trigger-file-name"></div>
      </div>
    </div>
    <div class="form-group">
      <label>Video <span style="color:var(--text3);font-weight:300;text-transform:none;letter-spacing:0;">(MP4 — plays on trigger)</span></label>
      <div class="drop-zone" id="video-dropzone">
        <input type="file" id="art-video" accept="video/mp4" onchange="handleFileSelect(this,'video-dropzone','video-file-name')">
        <div class="drop-zone-icon">🎬</div>
        <div class="drop-zone-label">Drop MP4 here or click to browse</div>
        <div class="drop-zone-file" id="video-file-name"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('artwork-modal')">Cancel</button>
      <button class="btn btn-gold" id="art-submit-btn" onclick="submitArtwork()">Upload Artwork</button>
    </div>
  </div>
</div>

<!-- COMPILE OVERLAY -->
<div class="compile-overlay" id="compile-overlay">
  <div class="compile-icon">⚙</div>
  <div class="compile-title">Compiling AR Targets</div>
  <div class="compile-status" id="compile-status">Initialising…</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
</div>

<!-- TOASTS -->
<div id="toasts"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let customers = []
let currentCustomer = null
let artworks = []
let artworkCounts = {}

// ── API ───────────────────────────────────────────────────────────────────────
async function api (method, url, body) {
  const opts = { method }
  if (body instanceof FormData) {
    opts.body = body
  } else if (body) {
    opts.headers = { 'Content-Type': 'application/json' }
    opts.body = JSON.stringify(body)
  }
  const res = await fetch(url, opts)
  const data = await res.json().catch(() => ({}))
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`)
  return data
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init () {
  try {
    customers = await api('GET', '/api/customers')
    renderSidebar()
    if (customers.length > 0) selectCustomer(customers[0])
  } catch (e) {
    document.getElementById('customer-list').innerHTML =
      `<div style="padding:16px;color:var(--err);font-size:12px">Failed to load: ${e.message}<br><br>Is the server running?</div>`
  }
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar () {
  const list = document.getElementById('customer-list')
  if (!customers.length) {
    list.innerHTML = `<div style="padding:20px 12px;color:var(--text3);font-size:12px;text-align:center">No customers yet.<br>Create one to get started.</div>`
    return
  }
  list.innerHTML = customers.map((c, i) => `
    <div class="customer-item ${currentCustomer?.id === c.id ? 'active' : ''}" onclick="selectCustomerByIndex(${i})">
      <div class="customer-dot"></div>
      <div class="customer-name">${esc(c.name)}</div>
      <div class="customer-count">${artworkCounts[c.id] ?? '…'}</div>
    </div>
  `).join('')
}

function selectCustomerByIndex (i) {
  selectCustomer(customers[i])
}

async function selectCustomer (customer) {
  currentCustomer = customer

  renderSidebar()
  renderMain('loading')

  try {
    const { artworks: list } = await api('GET', `/api/customer/${customer.slug}/artworks`)
    artworks = list || []
    artworkCounts[customer.id] = artworks.length
    renderSidebar()
    renderMain('artworks')
  } catch (e) {
    renderMain('error', e.message)
  }
}

// ── Main area ─────────────────────────────────────────────────────────────────
function renderMain (state, msg) {
  const main = document.getElementById('main')

  if (state === 'loading') {
    main.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;"><div class="spinner"></div></div>`
    return
  }

  if (state === 'error') {
    main.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--err);font-size:13px;padding:40px;text-align:center;">${esc(msg || 'Error')}</div>`
    return
  }

  const mindUrl = `https://adwluvwvemzrfpgukhtc.supabase.co/storage/v1/object/public/minds/customers/${currentCustomer.slug}/targets.mind`

  main.innerHTML = `
    <div class="main-header">
      <div class="main-title-area">
        <div class="main-title">${esc(currentCustomer.name)}</div>
        <div class="main-subtitle">
          slug: <span style="font-family:monospace;color:var(--gold)">${esc(currentCustomer.slug)}</span>
          &nbsp;·&nbsp;
          ${artworks.length} artwork${artworks.length !== 1 ? 's' : ''}
        </div>
      </div>
      <div class="main-actions">
        <button class="btn btn-outline btn-sm" onclick="copyToClipboard('${mindUrl}')" title="Copy .mind file URL">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy .mind URL
        </button>
        <button class="btn btn-outline btn-sm" onclick="compileTargets()" id="compile-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5,3 19,12 5,21"/></svg>
          Compile Targets
        </button>
        <button class="btn btn-gold btn-sm" onclick="openModal('artwork-modal')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Artwork
        </button>
      </div>
    </div>
    <div class="content-area" id="artwork-grid-container">
      ${renderArtworksHTML()}
    </div>
  `
}

function renderArtworksHTML () {
  if (!artworks.length) {
    return `
      <div class="empty-state">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21,15 16,10 5,21"/>
        </svg>
        <p>No artworks yet</p>
        <span>Upload trigger images and videos to get started</span>
        <button class="btn btn-gold" style="margin-top:8px" onclick="openModal('artwork-modal')">Add First Artwork</button>
      </div>
    `
  }
  return `<div class="artworks-grid">${artworks.map(artworkCardHTML).join('')}</div>`
}

function artworkCardHTML (a) {
  const thumb = a.trigger_url
    ? `<img class="card-thumb" src="${esc(a.trigger_url)}" alt="${esc(a.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : ''
  const placeholder = `<div class="card-thumb-placeholder" ${a.trigger_url ? 'style="display:none"' : ''}>
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3">
      <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/>
    </svg>
  </div>`

  return `
    <div class="artwork-card" data-id="${a.id}">
      ${thumb}${placeholder}
      <div class="card-body">
        <div class="card-name">${esc(a.name)}</div>
        <div class="card-slug">${esc(a.slug)}</div>
        <div class="card-actions">
          ${a.video_url ? `<a href="${esc(a.video_url)}" target="_blank" class="btn btn-outline btn-sm" style="flex:1;justify-content:center">▶ Video</a>` : ''}
          <button class="btn btn-danger" onclick="deleteArtwork('${a.id}','${esc(a.name)}')">Delete</button>
        </div>
      </div>
    </div>
  `
}

// ── Customer CRUD ─────────────────────────────────────────────────────────────
document.getElementById('cust-name').addEventListener('input', function () {
  const slug = document.getElementById('cust-slug')
  if (!slug.dataset.manual) slug.value = slugify(this.value)
})
document.getElementById('cust-slug').addEventListener('input', function () {
  this.dataset.manual = this.value ? '1' : ''
})

async function submitCustomer () {
  const name = document.getElementById('cust-name').value.trim()
  const slug = document.getElementById('cust-slug').value.trim()
  if (!name || !slug) { toast('Name and slug are required', 'err'); return }

  const btn = document.getElementById('cust-submit-btn')
  btn.disabled = true; btn.textContent = 'Creating…'

  try {
    const customer = await api('POST', '/api/customer', { name, slug })
    customers.push(customer)
    artworkCounts[customer.id] = 0
    closeModal('customer-modal')
    document.getElementById('cust-name').value = ''
    document.getElementById('cust-slug').value = ''
    delete document.getElementById('cust-slug').dataset.manual
    await selectCustomer(customer)
    toast(`Customer "${name}" created`, 'ok')
  } catch (e) {
    toast(e.message, 'err')
  } finally {
    btn.disabled = false; btn.textContent = 'Create Customer'
  }
}

// ── Artwork CRUD ──────────────────────────────────────────────────────────────
document.getElementById('art-name').addEventListener('input', function () {
  const slug = document.getElementById('art-slug')
  if (!slug.dataset.manual) slug.value = slugify(this.value)
})
document.getElementById('art-slug').addEventListener('input', function () {
  this.dataset.manual = this.value ? '1' : ''
})

function handleFileSelect (input, zoneId, labelId) {
  const file = input.files[0]
  document.getElementById(labelId).textContent = file ? file.name : ''
}

async function submitArtwork () {
  if (!currentCustomer) return
  const name = document.getElementById('art-name').value.trim()
  const slug = document.getElementById('art-slug').value.trim()
  const trigger = document.getElementById('art-trigger').files[0]
  const video = document.getElementById('art-video').files[0]

  if (!name || !slug) { toast('Name and slug required', 'err'); return }
  if (!trigger) { toast('Trigger image required', 'err'); return }
  if (!video)   { toast('Video (MP4) required', 'err'); return }

  const btn = document.getElementById('art-submit-btn')
  btn.disabled = true; btn.textContent = 'Uploading…'

  try {
    const fd = new FormData()
    fd.append('customer_slug', currentCustomer.slug)
    fd.append('artwork_name', name)
    fd.append('artwork_slug', slug)
    fd.append('trigger', trigger)
    fd.append('video', video)

    const artwork = await api('POST', '/api/artwork/upload', fd)
    artworks.push(artwork)
    artworkCounts[currentCustomer.id] = (artworkCounts[currentCustomer.id] || 0) + 1

    closeModal('artwork-modal')
    document.getElementById('art-name').value = ''
    document.getElementById('art-slug').value = ''
    delete document.getElementById('art-slug').dataset.manual
    document.getElementById('art-trigger').value = ''
    document.getElementById('art-video').value = ''
    document.getElementById('trigger-file-name').textContent = ''
    document.getElementById('video-file-name').textContent = ''

    renderMain('artworks')
    renderSidebar()
    toast(`"${name}" uploaded`, 'ok')
  } catch (e) {
    toast(e.message, 'err')
  } finally {
    btn.disabled = false; btn.textContent = 'Upload Artwork'
  }
}

async function deleteArtwork (id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return
  try {
    await api('DELETE', `/api/artwork/${id}`)
    artworks = artworks.filter(a => a.id !== id)
    artworkCounts[currentCustomer.id] = Math.max(0, (artworkCounts[currentCustomer.id] || 1) - 1)
    renderMain('artworks')
    renderSidebar()
    toast(`"${name}" deleted`, 'ok')
  } catch (e) {
    toast(e.message, 'err')
  }
}

// ── Compile ───────────────────────────────────────────────────────────────────
async function compileTargets () {
  if (!currentCustomer) return
  if (!artworks.length) { toast('No artworks to compile', 'err'); return }

  showCompileOverlay('Compiling AR targets on server…')

  try {
    // Server handles everything: downloads images, runs MindAR in headless Chrome, uploads .mind
    const result = await api('POST', `/api/compile/${currentCustomer.slug}`)

    hideCompileOverlay()
    toast(`Compiled ${result.imageCount} target${result.imageCount !== 1 ? 's' : ''} ✓`, 'ok')
    console.log('Mind URL:', result.mindUrl)

  } catch (e) {
    hideCompileOverlay()
    toast('Compile failed: ' + e.message, 'err')
    console.error(e)
  }
}

function showCompileOverlay (status) {
  document.getElementById('compile-overlay').classList.add('open')
  document.getElementById('compile-status').textContent = status || 'Working…'
  document.getElementById('progress-bar').style.width = '0%'
  document.getElementById('progress-bar').style.animation = 'indeterminate 1.5s ease-in-out infinite'
}

function hideCompileOverlay () {
  document.getElementById('compile-overlay').classList.remove('open')
  document.getElementById('progress-bar').style.animation = ''
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function esc (s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function slugify (s) {
  return s.toLowerCase().trim()
    .replace(/[^a-z0-9\s-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
}

function toast (msg, type) {
  const el = document.createElement('div')
  el.className = `toast ${type}`
  el.innerHTML = `<div class="toast-dot"></div><span>${esc(msg)}</span>`
  document.getElementById('toasts').appendChild(el)
  setTimeout(() => el.remove(), 4000)
}

function openModal (id) {
  document.getElementById(id).classList.add('open')
}

function closeModal (id) {
  document.getElementById(id).classList.remove('open')
}

function loadScript (src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script')
    s.src = src
    s.onload = resolve
    s.onerror = () => reject(new Error('Failed to load: ' + src))
    document.head.appendChild(s)
  })
}

function copyToClipboard (text) {
  navigator.clipboard.writeText(text).then(() => toast('URL copied to clipboard', 'ok'))
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open') })
})

// Drag-over styling
document.querySelectorAll('.drop-zone').forEach(zone => {
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over') })
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'))
  zone.addEventListener('drop', () => zone.classList.remove('drag-over'))
})

// ── Boot ──────────────────────────────────────────────────────────────────────
init()
</script>
</body>
</html>
