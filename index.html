<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Living Artwork</title>
  <style>
    :root {
      --gold:       #c9a84c;
      --gold-light: #f0c060;
      --gold-dark:  #8a6820;
      --dark:       #0d0d0d;
      --dark-2:     #161616;
      --text:       #e8e0cc;
      --text-dim:   #666;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100dvh;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Welcome screen ─────────────────────────────────────── */
    #welcome {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px 40px;
      z-index: 60;
      background: var(--dark);
    }

    .wordmark {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 28px;
    }

    .preview-wrap {
      position: relative;
      width: min(240px, 68vw);
      aspect-ratio: 1 / 1;
      margin-bottom: 28px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(201,168,76,0.18);
      background: var(--dark-2);
    }

    #preview-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    #preview-img.visible { opacity: 1; }

    .shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(100deg, var(--dark-2) 30%, #242424 50%, var(--dark-2) 70%);
      background-size: 250% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .preview-wrap::before, .preview-wrap::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0;
      transition: opacity 0.5s 0.3s;
      z-index: 2;
    }
    .preview-wrap::before { top: 0; left: 0; border-width: 2px 0 0 2px; border-radius: 6px 0 0 0; }
    .preview-wrap::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; border-radius: 0 0 6px 0; }
    .preview-wrap.loaded::before,
    .preview-wrap.loaded::after { opacity: 1; }

    h1 {
      font-size: 1.55rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.6;
      max-width: 260px;
      margin-bottom: 36px;
    }

    #start-btn {
      background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 100%);
      color: #1a1000;
      border: none;
      padding: 15px 36px;
      border-radius: 50px;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      min-width: 230px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(201,168,76,0);
    }
    #start-btn:not(:disabled):hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(201,168,76,0.25);
    }
    #start-btn:disabled { opacity: 0.38; cursor: not-allowed; }

    .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(26,16,0,0.3);
      border-top-color: #1a1000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-line {
      margin-top: 14px;
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      min-height: 1.2em;
      text-align: center;
    }

    .error-msg {
      margin-top: 14px;
      font-size: 0.76rem;
      color: #f08080;
      text-align: center;
      max-width: 280px;
      line-height: 1.55;
      display: none;
    }

    /* ── Camera / AR container (detection only, always behind video) ── */
    #ar-container {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 50;
    }
    #ar-container a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Scan overlay (shown while searching) ───────────────── */
    #scan-overlay {
      position: fixed;
      inset: 0;
      z-index: 150;
      pointer-events: none;
      display: none;
    }

    .scan-frame {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -58%);
      width: min(66vw, 270px);
      height: min(66vw, 270px);
    }

    .scan-frame::before, .scan-frame::after,
    .c-br, .c-bl {
      content: '';
      position: absolute;
      width: 26px; height: 26px;
      border-color: var(--gold);
      border-style: solid;
    }
    .scan-frame::before { top: 0; left: 0;  border-width: 2.5px 0 0 2.5px; }
    .scan-frame::after  { top: 0; right: 0; border-width: 2.5px 2.5px 0 0; }
    .c-br               { bottom: 0; right: 0; border-width: 0 2.5px 2.5px 0; }
    .c-bl               { bottom: 0; left: 0;  border-width: 0 0 2.5px 2.5px; }

    .scan-line {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(66vw, 270px);
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: scanMove 2.2s ease-in-out infinite;
    }
    @keyframes scanMove {
      0%, 100% { top: calc(50% - min(33vw, 135px)); }
      50%       { top: calc(50% + min(33vw, 135px)); }
    }

    .scan-label {
      position: absolute;
      bottom: 24%; left: 50%;
      transform: translateX(-50%);
      color: var(--gold);
      font-size: 0.76rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(201,168,76,0.55);
      white-space: nowrap;
    }

    /* ── Fullscreen video (shown on detection) ──────────────── */
    /* Sits above the camera feed and scan overlay.             */
    /* Camera keeps running behind it for lost/found tracking.  */
    #video-screen {
      position: fixed;
      inset: 0;
      z-index: 160;
      background: #000;
      display: none;
    }

    #fullscreen-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Landscape artwork on a portrait phone: rotate the video 90° so it fills
       the screen. The CSS box is swapped (100vh × 100vw) and offset so its
       centre sits at the viewport centre; the transform maps all four corners
       exactly to the screen corners. */
    #video-screen.landscape-on-portrait #fullscreen-video {
      position: absolute;
      width: 100vh;
      height: 100vw;
      top: calc((100vh - 100vw) / 2);
      left: calc((100vw - 100vh) / 2);
      transform: rotate(90deg);
      transform-origin: center center;
    }

    /* Portrait artwork on a landscape phone: show full height, centred.
       Orientation lock is the primary fix; this is the iOS fallback. */
    #video-screen.portrait-on-landscape #fullscreen-video {
      position: absolute;
      width: auto;
      height: 100%;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    /* ── Expanding rings (above video) ──────────────────────── */
    #ring-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none;
      display: none;
    }

    .ring {
      position: absolute;
      top: 50%; left: 50%;
      width: 120px; height: 120px;
      border: 2px solid var(--gold);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      will-change: transform, opacity;
    }
    .ring.go {
      animation: ringBurst 1.1s cubic-bezier(0.15, 0.5, 0.4, 1) forwards;
    }
    .ring:nth-child(2).go { animation-delay: 0.20s; }
    .ring:nth-child(3).go { animation-delay: 0.40s; }

    @keyframes ringBurst {
      0%   { transform: translate(-50%, -50%) scale(0.15); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(5.5);  opacity: 0; }
    }

    /* ── Close button ───────────────────────────────────────── */
    #close-btn {
      position: fixed;
      top: 16px; right: 16px;
      z-index: 300;
      width: 40px; height: 40px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(201,168,76,0.6);
      color: var(--gold);
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      pointer-events: all;
    }
  </style>
</head>
<body>

<!-- Welcome screen -->
<div id="welcome">
  <div class="wordmark">Living Artwork</div>

  <div class="preview-wrap" id="preview-wrap">
    <div class="shimmer" id="shimmer"></div>
    <img id="preview-img"
         src="https://raw.githubusercontent.com/Olster61/living-artwork/main/artwork.png"
         crossorigin="anonymous"
         alt="Artwork target">
  </div>

  <h1>Bring Art to Life</h1>
  <p class="subtitle">Point your camera at the artwork to reveal a hidden experience</p>

  <button id="start-btn" disabled>
    <div class="btn-inner">
      <div class="spinner" id="spinner"></div>
      <span id="btn-label">Preparing…</span>
    </div>
  </button>

  <div class="status-line" id="status-line">Loading experience…</div>
  <div class="error-msg"   id="error-msg"></div>
</div>

<!-- MindAR A-Frame scene — detection only, camera feed visible while scanning -->
<div id="ar-container"></div>

<!-- Scan prompt — visible while searching for artwork -->
<div id="scan-overlay">
  <div class="scan-frame">
    <div class="c-br"></div>
    <div class="c-bl"></div>
  </div>
  <div class="scan-line"></div>
  <div class="scan-label">Point at the artwork</div>
</div>

<!-- Fullscreen video — covers camera entirely on detection -->
<div id="video-screen">
  <video id="fullscreen-video"
    src="https://raw.githubusercontent.com/Olster61/living-artwork/main/artwork.mp4"
    preload="auto" loop playsinline webkit-playsinline
    crossorigin="anonymous">
  </video>
</div>

<!-- Expanding rings — above the video layer -->
<div id="ring-overlay">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
</div>

<!-- Exit AR -->
<button id="close-btn" title="Exit">&#x2715;</button>

<script>
  const TARGET_URL = 'https://raw.githubusercontent.com/Olster61/living-artwork/main/artwork.png';

  const COMPILER_CANDIDATES = [
    { url: 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js', version: '1.2.5', esm: true  },
    { url: 'https://unpkg.com/mind-ar@1.2.5/dist/mindar-image.prod.js',            version: '1.2.5', esm: true  },
    { url: 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js', version: '1.2.2', esm: true  },
    { url: 'https://unpkg.com/mind-ar@1.2.2/dist/mindar-image.prod.js',            version: '1.2.2', esm: true  },
    { url: 'https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image.prod.js', version: '1.1.5', esm: false },
    { url: 'https://unpkg.com/mind-ar@1.1.5/dist/mindar-image.prod.js',            version: '1.1.5', esm: false },
  ];
  const AFRAME_URLS = [
    'https://aframe.io/releases/1.4.2/aframe.min.js',
    'https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js',
    'https://unpkg.com/aframe@1.4.2/dist/aframe.min.js',
  ];
  const AFRAME_INTEGRATION = {
    '1.2.5': ['https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js', 'https://unpkg.com/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js'],
    '1.2.2': ['https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js', 'https://unpkg.com/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js'],
    '1.1.5': ['https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-aframe.prod.js', 'https://unpkg.com/mind-ar@1.1.5/dist/mindar-image-aframe.prod.js'],
  };

  let compiledMindUrl = null;
  let mindarVersion   = null;
  let aframeLoaded    = false;
  let hasError        = false;

  const welcome      = document.getElementById('welcome');
  const startBtn     = document.getElementById('start-btn');
  const btnLabel     = document.getElementById('btn-label');
  const spinner      = document.getElementById('spinner');
  const statusLine   = document.getElementById('status-line');
  const errorMsg     = document.getElementById('error-msg');
  const previewImg   = document.getElementById('preview-img');
  const previewWrap  = document.getElementById('preview-wrap');
  const shimmerEl    = document.getElementById('shimmer');
  const arContainer  = document.getElementById('ar-container');
  const scanOverlay  = document.getElementById('scan-overlay');
  const videoScreen  = document.getElementById('video-screen');
  const fullscreenVid= document.getElementById('fullscreen-video');
  const ringOverlay  = document.getElementById('ring-overlay');
  const closeBtn     = document.getElementById('close-btn');

  // ── Utilities ──────────────────────────────────────────────

  function loadScript(url) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = url;
      s.onload = resolve;
      s.onerror = () => reject(new Error('Failed to load ' + url));
      document.head.appendChild(s);
    });
  }

  async function loadScriptWithFallback(urls, label) {
    let last;
    for (const url of urls) {
      try { await loadScript(url); return; }
      catch (e) { last = e; }
    }
    throw new Error('Could not load ' + label + '. Check connection and try again.');
  }

  async function loadMindARCompiler() {
    for (const c of COMPILER_CANDIDATES) {
      try {
        if (c.esm) { await import(c.url); }
        else        { await loadScript(c.url); }
        if (window.MINDAR && window.MINDAR.IMAGE && window.MINDAR.IMAGE.Compiler) {
          mindarVersion = c.version;
          return;
        }
      } catch (e) {
        console.warn('[AR] MindAR candidate failed:', c.url, e.message);
      }
    }
    throw new Error('Could not load MindAR. Check your internet connection and try again.');
  }

  function resizeForCompile(img, maxPx = 1024) {
    let w = img.naturalWidth, h = img.naturalHeight;
    if (w > maxPx || h > maxPx) {
      const s = maxPx / Math.max(w, h);
      w = Math.round(w * s); h = Math.round(h * s);
    }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    return new Promise((resolve, reject) => {
      canvas.toBlob(blob => {
        // blob is null when the canvas is tainted (CORS) — reject instead of hanging.
        if (!blob) { reject(new Error('canvas.toBlob returned null — possible CORS issue')); return; }
        const out = new Image();
        const url = URL.createObjectURL(blob);
        out.onload  = () => { URL.revokeObjectURL(url); resolve(out); };
        out.onerror = () => { URL.revokeObjectURL(url); reject(new Error('resized image failed to load')); };
        out.src = url;
      }, 'image/jpeg', 0.92);
    });
  }

  // ── Preview image ───────────────────────────────────────────

  function waitForPreview() {
    return new Promise((resolve, reject) => {
      if (previewImg.complete && previewImg.naturalWidth > 0) resolve();
      else {
        previewImg.addEventListener('load',  resolve, { once: true });
        previewImg.addEventListener('error', reject,  { once: true });
      }
    });
  }

  let artworkIsLandscape = null;

  previewImg.addEventListener('load', () => {
    artworkIsLandscape = previewImg.naturalWidth >= previewImg.naturalHeight;
    shimmerEl.style.display = 'none';
    previewImg.classList.add('visible');
    previewWrap.classList.add('loaded');
  });
  previewImg.addEventListener('error', () => { shimmerEl.style.display = 'none'; });

  // Camera-ready tracking (set in launchAR, cleaned up on close)
  let cameraReadyObs   = null;
  let cameraReadyTimer = null;

  // Guards targetFound/targetLost so stale MindAR state from the previous
  // session cannot trigger the video before the camera has properly started.
  let scanActive = false;

  // Debug overlay (removed on close)
  let debugEl    = null;
  let debugTimer = null;

  // ── Preparation (runs on page load) ────────────────────────

  async function prepare() {
    hasError = false;
    errorMsg.style.display = 'none';
    try {
      setStatus('Loading engine…');
      await loadMindARCompiler();

      setStatus('Analysing artwork…');
      let sourceImg;
      try {
        await waitForPreview();
        sourceImg = previewImg;
      } catch {
        const resp = await fetch(TARGET_URL);
        if (!resp.ok) throw new Error('Could not load artwork image.');
        const blob = await resp.blob();
        sourceImg = await new Promise((res, rej) => {
          const i = new Image();
          const url = URL.createObjectURL(blob);
          i.onload  = () => { URL.revokeObjectURL(url); res(i); };
          i.onerror = rej;
          i.src = url;
        });
      }

      if (artworkIsLandscape === null) {
        artworkIsLandscape = sourceImg.naturalWidth >= sourceImg.naturalHeight;
      }

      const resized = await resizeForCompile(sourceImg);

      setStatus('Compiling… 0%');
      const compiler = new window.MINDAR.IMAGE.Compiler();
      await compiler.compileImageTargets([resized], progress => {
        setStatus('Compiling… ' + Math.round(progress * 100) + '%');
      });

      const buffer = await compiler.exportData();
      if (compiledMindUrl) URL.revokeObjectURL(compiledMindUrl);
      compiledMindUrl = URL.createObjectURL(new Blob([buffer]));

      setStatus('');
      setBtnReady();
    } catch (err) {
      hasError = true;
      setStatus('');
      showError('Setup failed: ' + (err.message || err));
      setBtnRetry();
    }
  }

  function setStatus(msg)  { statusLine.textContent = msg; }
  function showError(msg)  { errorMsg.textContent = msg; errorMsg.style.display = 'block'; }

  function setBtnReady() {
    startBtn.disabled = false;
    btnLabel.textContent = 'Start AR Experience';
    spinner.style.display = 'none';
  }
  function setBtnRetry() {
    startBtn.disabled = false;
    btnLabel.textContent = 'Retry';
    spinner.style.display = 'none';
  }

  // ── Start button ────────────────────────────────────────────

  startBtn.addEventListener('click', async () => {
    if (hasError) {
      hasError = false;
      compiledMindUrl = null;
      startBtn.disabled = true;
      btnLabel.textContent = 'Preparing…';
      spinner.style.display = 'inline-block';
      errorMsg.style.display = 'none';
      await prepare();
      return;
    }

    startBtn.disabled = true;
    spinner.style.display = 'inline-block';
    btnLabel.textContent = 'Starting…';

    try {
      if (!aframeLoaded) {
        setStatus('Loading AR framework…');
        await loadScriptWithFallback(AFRAME_URLS, 'A-Frame');
        const integrationUrls = AFRAME_INTEGRATION[mindarVersion] || AFRAME_INTEGRATION['1.1.5'];
        await loadScriptWithFallback(integrationUrls, 'MindAR A-Frame');
        aframeLoaded = true;
      }
      setStatus('');
      launchAR();
    } catch (err) {
      startBtn.disabled = false;
      spinner.style.display = 'none';
      btnLabel.textContent = 'Start AR Experience';
      setStatus('');
      showError('Could not start AR: ' + (err.message || err));
    }
  });

  // ── Rings animation ─────────────────────────────────────────

  function fireRings() {
    const rings = ringOverlay.querySelectorAll('.ring');
    rings.forEach(r => { r.classList.remove('go'); void r.offsetWidth; });
    ringOverlay.style.display = 'block';
    rings.forEach(r => r.classList.add('go'));
    setTimeout(() => { ringOverlay.style.display = 'none'; }, 1900);
  }

  // ── Launch AR ───────────────────────────────────────────────
  // A-Frame scene is detection-only: no <a-assets>, no <a-plane>.
  // The camera feed stays visible while scanning; #video-screen
  // covers it entirely when the target is found.

  function launchAR() {
    scanActive = false; // reset; will be set true once camera is live
    // Start the AR scene behind the welcome screen (z-index 60 > ar-container 50).
    // Welcome acts as a loading cover so there's no black-screen flash.
    arContainer.style.display = 'block';
    closeBtn.style.display    = 'flex';

    arContainer.innerHTML = `
      <a-scene
        mindar-image="imageTargetSrc: ${compiledMindUrl}; autoStart: true; uiLoading: no; uiScanning: no; uiError: no; filterMinCF: 0.001; filterBeta: 1000; warmupTolerance: 2; missTolerance: 8;"
        color-space="sRGB"
        renderer="colorManagement: true; antialias: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
      >
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0"></a-entity>
      </a-scene>
    `;

    // Show camera immediately — no waiting for canplay.
    welcome.style.display     = 'none';
    scanOverlay.style.display = 'block';

    // Enable detection 400ms after the camera video starts playing, so
    // residual MindAR state from a prior session cannot fire targetFound
    // before the new feed has stabilised. scanActive = true is the gate.
    cameraReadyObs = new MutationObserver(() => {
      const v = document.querySelector('video[autoplay]:not(#fullscreen-video)');
      if (!v) return;
      cameraReadyObs.disconnect(); cameraReadyObs = null;
      if (cameraReadyTimer) { clearTimeout(cameraReadyTimer); cameraReadyTimer = null; }
      const arm = () => setTimeout(() => { scanActive = true; }, 400);
      if (v.readyState >= 3) arm();
      else v.addEventListener('canplay', arm, { once: true });
    });
    cameraReadyObs.observe(document.body, { childList: true, subtree: true });
    cameraReadyTimer = setTimeout(() => { scanActive = true; }, 4000); // fallback

    const entity = arContainer.querySelector('[mindar-image-target]');

    if (entity) {
      entity.addEventListener('targetFound', () => {
        if (!scanActive) return;
        // Double rAF ensures the One Euro Filter has settled before we switch
        // to the video screen, preventing a brief wrong-pose flash.
        requestAnimationFrame(() => requestAnimationFrame(() => {
          if (!scanActive) return;
          scanOverlay.style.display  = 'none';
          // Show video screen first so play() is called on a visible element
          videoScreen.style.display  = 'block';
          applyVideoLayout();
          lockOrientation();
          fireRings();
          fullscreenVid.play().catch(() => {});
        }));
      });

      entity.addEventListener('targetLost', () => {
        if (!scanActive) return;
        fullscreenVid.pause();
        videoScreen.style.display  = 'none';
        scanOverlay.style.display  = 'block';
      });
    }

    // ── Live debug overlay ────────────────────────────────────
    debugEl = document.createElement('div');
    debugEl.style.cssText = [
      'position:fixed', 'top:8px', 'left:8px', 'z-index:9999',
      'background:rgba(0,0,0,.82)', 'color:#0f0',
      'font:11px/1.65 monospace', 'padding:6px 12px',
      'border-radius:5px', 'pointer-events:none',
      'max-width:92vw', 'word-break:break-all',
    ].join(';');
    document.body.appendChild(debugEl);

    let dbgTicks = 0;
    const dbgScene = arContainer.querySelector('a-scene');

    const patchTick = () => {
      const sys = dbgScene && dbgScene.systems && dbgScene.systems['mindar-image-system'];
      if (!sys || !sys.tick || sys.__dbgPatched) return;
      sys.__dbgPatched = true;
      const orig = sys.tick.bind(sys);
      sys.tick = function (t, dt) { dbgTicks++; return orig(t, dt); };
    };
    if (dbgScene) {
      if (dbgScene.hasLoaded) patchTick();
      else dbgScene.addEventListener('loaded', patchTick);
    }

    debugTimer = setInterval(() => {
      if (!debugEl) return;
      const sc  = document.querySelector('a-scene');
      const sys = sc && sc.systems && sc.systems['mindar-image-system'];
      const ctrl = sys && sys.controller;

      // MindAR internals differ by version — try both structures
      let ts = null;
      if (ctrl) {
        const pl = ctrl.processorList;
        if (pl && pl[0] && pl[0].trackingStates) ts = pl[0].trackingStates[0];
        else if (ctrl.trackingStates)             ts = ctrl.trackingStates[0];
      }

      const vid = sys && sys.video;
      const camStr = vid
        ? vid.videoWidth + 'x' + vid.videoHeight + ' rs=' + vid.readyState
        : '—';
      const trackStr = ts
        ? 'miss=' + ts.miss + ' warm=' + (ts.reached ? '✓' : '✗')
        : '—';

      debugEl.innerHTML = [
        'scene: '      + (sc ? (sc.hasLoaded ? '✓ loaded' : 'loading…') : '✗ none'),
        'mindar sys: ' + (sys  ? '✓' : '✗ missing'),
        'controller: ' + (ctrl ? '✓' : '✗ missing'),
        'cam: '        + camStr,
        'ticks: '      + dbgTicks,
        'scanActive: ' + scanActive,
        'mind URL: '   + (compiledMindUrl ? '✓' : '✗'),
        'tracking: '   + trackStr,
      ].join('<br>');
    }, 300);
  }

  // ── Orientation helpers ─────────────────────────────────────
  // Lock to the artwork's orientation on Android Chrome.
  // iOS doesn't support screen.orientation.lock, so the CSS classes
  // set by applyVideoLayout() act as the fallback on all browsers.

  function applyVideoLayout() {
    if (artworkIsLandscape === null) return;
    const phoneIsLandscape = window.innerWidth >= window.innerHeight;
    if (artworkIsLandscape && !phoneIsLandscape) {
      videoScreen.className = 'landscape-on-portrait';
    } else if (!artworkIsLandscape && phoneIsLandscape) {
      videoScreen.className = 'portrait-on-landscape';
    } else {
      videoScreen.className = '';
    }
  }

  window.addEventListener('resize', () => {
    if (videoScreen.style.display !== 'none') applyVideoLayout();
  });

  async function lockOrientation() {
    try {
      if (screen.orientation && screen.orientation.lock) {
        await screen.orientation.lock(artworkIsLandscape ? 'landscape' : 'portrait');
      }
    } catch (e) { /* CSS layout fallback handles mismatched orientations */ }
  }

  function unlockOrientation() {
    try {
      if (screen.orientation && screen.orientation.unlock) {
        screen.orientation.unlock();
      }
    } catch (e) {}
  }

  // ── Exit AR ─────────────────────────────────────────────────

  closeBtn.addEventListener('click', () => {
    scanActive = false; // prevent any in-flight targetFound from firing
    if (debugTimer) { clearInterval(debugTimer); debugTimer = null; }
    if (debugEl)    { debugEl.remove(); debugEl = null; }
    if (cameraReadyObs)   { cameraReadyObs.disconnect(); cameraReadyObs = null; }
    if (cameraReadyTimer) { clearTimeout(cameraReadyTimer); cameraReadyTimer = null; }
    unlockOrientation();
    const scene = arContainer.querySelector('a-scene');
    if (scene && scene.destroy) scene.destroy();
    arContainer.innerHTML      = '';
    arContainer.style.display  = 'none';
    scanOverlay.style.display  = 'none';
    videoScreen.style.display  = 'none';
    ringOverlay.style.display  = 'none';
    closeBtn.style.display     = 'none';
    fullscreenVid.pause();
    welcome.style.display      = 'flex';
    setBtnReady();
  });

  prepare();
</script>
</body>
</html>
